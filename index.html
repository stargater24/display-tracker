// ══════════════════════════════════════
//  Product on Shelf
// ══════════════════════════════════════
function ShelfProduct({ product, shelfH, pxPerMM, selected, onSelect, onEdit, onRemove, onResetDims, cleanView }) {
  const unit = useContext(UnitCtx);
  const hasDims = product.width && product.height;
  const unitW = hasDims ? product.width * pxPerMM : 30;
  const unitH = hasDims ? Math.min((shelfH - 8) / (product.stacks || 1), product.height * pxPerMM) : Math.min(DEFAULT_PH, (shelfH - 8) / (product.stacks || 1));
  const facings = product.facings || 1;
  const stacks = product.stacks || 1;
  const needsDims = !hasDims;
  const [hover, setHover] = useState(false);
  const [ctxMenu, setCtxMenu] = useState(null);
  const gapR = product.gap != null ? product.gap : 0;
  const hasCrop = (product.cropT || 0) + (product.cropB || 0) + (product.cropL || 0) + (product.cropR || 0) > 0;
  const clipPath = hasCrop ? `inset(${product.cropT || 0}% ${product.cropR || 0}% ${product.cropB || 0}% ${product.cropL || 0}%)` : "none";

  // Close context menu on any outside click
  useEffect(() => {
    if (!ctxMenu) return;
    const close = () => setCtxMenu(null);
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, [ctxMenu]);

  const handleContextMenu = (e) => {
    if (cleanView) return;
    e.preventDefault();
    e.stopPropagation();
    setCtxMenu({ x: e.clientX, y: e.clientY });
  };

  const renderUnit = (key) => (
    <div key={key} style={{ width: unitW, height: unitH, overflow: "hidden", lineHeight: 0, fontSize: 0, display: "flex", alignItems: "flex-end" }}>
      {product.image_url ? (
        <img src={product.image_url} alt="" style={{ width: "100%", height: "auto", display: "block", margin: 0, padding: 0, clipPath: clipPath }} onError={(e) => { e.target.style.display = "none"; if (e.target.parentNode.lastChild) e.target.parentNode.lastChild.style.display = "flex"; }} />
      ) : null}
      <div style={{ width: "100%", height: "100%", background: "#dbeafe", border: "1px solid #93c5fd", display: product.image_url ? "none" : "flex", alignItems: "center", justifyContent: "center", textAlign: "center", fontSize: 7, lineHeight: "normal", boxSizing: "border-box" }}>
        {product.name ? product.name.slice(0, 20) : ""}
      </div>
    </div>
  );

  return (
    <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)} onContextMenu={handleContextMenu}
      style={{
        position: "relative", display: "inline-flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end",
        flexShrink: 0, padding: 0, lineHeight: 0,
        marginRight: gapR, marginTop: 0, marginBottom: 0, marginLeft: 0,
        outline: selected ? "2px solid #3b82f6" : "none", outlineOffset: -2,
        background: selected ? "rgba(219,234,254,0.5)" : needsDims ? "rgba(251,191,36,0.1)" : "transparent",
      }}
      title={`${product.name}\n${fmtDim(product.width, unit)} \u00d7 ${fmtDim(product.height, unit)}\nFacings: ${facings} \u00b7 Stacks: ${stacks}\nShelf width used: ${hasDims ? fmtDim(product.width * facings, unit) : "unknown"}\nRight-click for options`}
      onClick={(e) => onSelect(e)} onDoubleClick={() => onEdit()}>
      {/* Context menu */}
      {ctxMenu && (
        <div style={{ position: "fixed", left: ctxMenu.x, top: ctxMenu.y, zIndex: 100, background: "#fff", borderRadius: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.2)", border: "1px solid #e5e7eb", padding: "4px 0", minWidth: 140 }}>
          <div style={{ padding: "4px 12px", fontSize: 11, color: "#9ca3af", fontWeight: 500 }}>{product.name ? product.name.slice(0, 25) : "Product"}</div>
          <button onClick={(e) => { e.stopPropagation(); setCtxMenu(null); onEdit(); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 12px", fontSize: 12, background: "none", border: "none", cursor: "pointer", color: "#374151" }} onMouseEnter={(e) => e.target.style.background="#f3f4f6"} onMouseLeave={(e) => e.target.style.background="none"}>{"\u270e"} Edit Dimensions</button>
          <button onClick={(e) => { e.stopPropagation(); setCtxMenu(null); onResetDims(); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 12px", fontSize: 12, background: "none", border: "none", cursor: "pointer", color: "#f59e0b" }} onMouseEnter={(e) => e.target.style.background="#f3f4f6"} onMouseLeave={(e) => e.target.style.background="none"}>{"\u21ba"} Reset Dimensions</button>
          <button onClick={(e) => { e.stopPropagation(); setCtxMenu(null); onRemove(); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "6px 12px", fontSize: 12, background: "none", border: "none", cursor: "pointer", color: "#ef4444" }} onMouseEnter={(e) => e.target.style.background="#f3f4f6"} onMouseLeave={(e) => e.target.style.background="none"}>{"\u00d7"} Remove</button>
        </div>
      )}
      {!cleanView && hover && (
        <div style={{ position: "absolute", top: -6, right: -4, display: "flex", gap: 2, zIndex: 10 }}>
          <button onClick={(e) => { e.stopPropagation(); onEdit(); }} style={{ width: 16, height: 16, background: "#3b82f6", color: "#fff", border: "none", borderRadius: "50%", fontSize: 9, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{"\u270e"}</button>
          <button onClick={(e) => { e.stopPropagation(); onRemove(); }} style={{ width: 16, height: 16, background: "#ef4444", color: "#fff", border: "none", borderRadius: "50%", fontSize: 9, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>{"\u00d7"}</button>
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column-reverse", gap: 0, margin: 0, padding: 0, lineHeight: 0 }}>
        {Array.from({ length: stacks }).map((_, si) => (
          <div key={si} style={{ display: "flex", gap: 0, margin: 0, padding: 0, lineHeight: 0 }}>
            {Array.from({ length: facings }).map((_, fi) => renderUnit(`${si}-${fi}`))}
          </div>
        ))}
      </div>
      {(facings > 1 || stacks > 1) && <div style={{ position: "absolute", bottom: 0, left: 0, background: "#374151", color: "#fff", fontSize: 7, padding: "0 3px", borderRadius: "0 3px 0 0", lineHeight: "12px" }}>{facings > 1 ? `${facings}W` : ""}{facings > 1 && stacks > 1 ? "\u00b7" : ""}{stacks > 1 ? `${stacks}H` : ""}</div>}
      {!cleanView && needsDims && <div style={{ position: "absolute", top: 0, left: 0, background: "#fbbf24", color: "#fff", fontSize: 7, padding: "0 3px", borderRadius: "0 0 3px 0" }}>no dims</div>}
    </div>
  );
}

// ══════════════════════════════════════
//  Shelf
// ══════════════════════════════════════
function Shelf({ shelf, index, total, onDrop, onUpdateProducts, onMoveUp, onMoveDown, onRemoveShelf, onResizeShelf, selected, onSelect, onEdit, clipboard, onPaste, cleanView, shelfThickness, shelfWidthMM }) {
  const unit = useContext(UnitCtx);
  const [dragOver, setDragOver] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const containerRef = useRef(null);
  const [containerW, setContainerW] = useState(800);
  const shelfHeightMM = shelf.height || DEFAULT_SHELF_H;

  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver((entries) => { for (const e of entries) setContainerW(e.contentRect.width); });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  const pxPerMM = containerW / shelfWidthMM;
  const shelfHpx = Math.max(40, shelfHeightMM * pxPerMM); // rendered pixel height
  const usedMM = shelf.products.reduce((sum, p) => p.width ? sum + p.width * (p.facings || 1) : sum, 0);
  const unknownCount = shelf.products.filter((p) => !p.width).length;
  const fillPct = shelfWidthMM > 0 ? Math.min(100, (usedMM / shelfWidthMM) * 100) : 0;
  const overFill = usedMM > shelfWidthMM;
  const remainMM = shelfWidthMM - usedMM;

  // Step shelf height by 1 inch (25.4mm)
  const stepHeight = (dir) => {
    const next = shelfHeightMM + dir * Math.round(ONE_INCH_MM);
    if (next >= MIN_SHELF_H && next <= MAX_SHELF_H) onResizeShelf(index, next);
  };

  const handleDragOver = (e) => { if (cleanView) return; e.preventDefault(); setDragOver(true); };
  const handleDrop = (e) => {
    if (cleanView) return;
    e.preventDefault(); setDragOver(false);
    const raw = e.dataTransfer.getData("text/plain");
    if (raw && raw.startsWith("reorder:")) { const fi = parseInt(raw.split(":")[1]); const p = [...shelf.products]; const [it] = p.splice(fi, 1); p.push(it); onUpdateProducts(index, p); return; }
    try { const data = JSON.parse(e.dataTransfer.getData("application/json")); if (data && data.id) onDrop(index, data); } catch(ex) {}
  };
  const pDragStart = (pi) => (e) => { if (cleanView) { e.preventDefault(); return; } setDragIdx(pi); e.dataTransfer.setData("text/plain", `reorder:${pi}`); };
  const pDrop = (ti) => (e) => {
    if (cleanView) return;
    e.preventDefault(); e.stopPropagation();
    const raw = e.dataTransfer.getData("text/plain");
    if (raw && raw.startsWith("reorder:")) { const fi = parseInt(raw.split(":")[1]); const p = [...shelf.products]; const [it] = p.splice(fi, 1); p.splice(ti, 0, it); onUpdateProducts(index, p); }
    setDragIdx(null);
  };
  const btn = { background: "none", border: "none", fontSize: 12, padding: "0 4px", color: "#9ca3af", cursor: "pointer" };
  const stepBtn = { background: "#e5e7eb", border: "none", fontSize: 10, padding: "1px 5px", color: "#374151", cursor: "pointer", borderRadius: 3, lineHeight: "14px" };

  return (
    <div style={{ position: "relative", marginBottom: cleanView ? 0 : 8 }}>
      {!cleanView && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 3, padding: "0 4px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 12, color: "#6b7280", fontWeight: 500 }}>Shelf {index + 1}</span>
            <span style={{ fontSize: 11, color: "#9ca3af" }}>H: {fmtDim(shelfHeightMM, unit)}</span>
            <button onClick={() => stepHeight(-1)} disabled={shelfHeightMM <= MIN_SHELF_H} style={{ ...stepBtn, opacity: shelfHeightMM <= MIN_SHELF_H ? 0.3 : 1 }}>{"\u25bc"} 1"</button>
            <button onClick={() => stepHeight(1)} disabled={shelfHeightMM >= MAX_SHELF_H} style={{ ...stepBtn, opacity: shelfHeightMM >= MAX_SHELF_H ? 0.3 : 1 }}>{"\u25b2"} 1"</button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
            <button onClick={() => onMoveUp(index)} disabled={index === 0} style={{ ...btn, opacity: index === 0 ? 0.3 : 1 }}>{"\u25b2"}</button>
            <button onClick={() => onMoveDown(index)} disabled={index === total - 1} style={{ ...btn, opacity: index === total - 1 ? 0.3 : 1 }}>{"\u25bc"}</button>
            <button onClick={() => onRemoveShelf(index)} style={{ ...btn, color: "#f87171" }}>{"\u2715"}</button>
          </div>
        </div>
      )}
      <div ref={containerRef} onDragOver={handleDragOver} onDragLeave={() => setDragOver(false)} onDrop={handleDrop}
        style={{ position: "relative", display: "flex", alignItems: "flex-end", gap: 0, padding: cleanView ? "0" : "2px 2px 0", overflowX: "auto", borderRadius: cleanView ? 0 : "4px 4px 0 0", minHeight: shelfHpx, height: shelfHpx, background: dragOver ? "#eff6ff" : cleanView ? "#fafafa" : "#f9fafb", outline: dragOver ? "2px solid #93c5fd" : "none" }}>
        {!cleanView && shelf.products.length === 0 && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#d1d5db", fontSize: 14, pointerEvents: "none" }}>Drop products here</div>}
        {shelf.products.map((p, pi) => (
          <div key={p._uid} draggable={!cleanView} onDragStart={pDragStart(pi)} onDragOver={(e) => { e.preventDefault(); e.stopPropagation(); }} onDrop={pDrop(pi)} style={{ cursor: cleanView ? "default" : "grab", opacity: dragIdx === pi ? 0.4 : 1, margin: 0, padding: 0, lineHeight: 0 }}>
            <ShelfProduct product={p} shelfH={shelfHpx} pxPerMM={pxPerMM} selected={!cleanView && selected.has(p._uid)} onSelect={(e) => { if (!cleanView) onSelect(index, pi, p._uid, e); }} onEdit={() => { if (!cleanView) onEdit(index, pi); }} onRemove={() => { if (!cleanView) onUpdateProducts(index, shelf.products.filter((_, i) => i !== pi)); }} onResetDims={() => { if (cleanView) return; const updated = [...shelf.products]; const prod = updated[pi]; if (prod.barcode) { const cache = loadDimCache(); delete cache[prod.barcode]; saveDimCache(cache); } updated[pi] = { ...prod, width: null, height: null, depth: null, cropT: 0, cropB: 0, cropL: 0, cropR: 0 }; onUpdateProducts(index, updated); }} cleanView={cleanView} />
          </div>
        ))}
      </div>
      <div style={{ height: Math.max(4, shelfThickness * pxPerMM), borderRadius: cleanView ? 0 : "0 0 4px 4px", boxShadow: cleanView ? "none" : "0 2px 4px rgba(0,0,0,0.15)", background: `linear-gradient(to bottom, ${SHELF_COLORS[index % 3]}, ${SHELF_COLORS[(index + 1) % 3]})`, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", bottom: 0, left: 0, width: `${Math.min(100, fillPct)}%`, height: "100%", background: overFill ? "rgba(239,68,68,0.3)" : "rgba(255,255,255,0.15)", transition: "width 0.2s" }} />
      </div>
      {!cleanView && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "2px 6px", fontSize: 10 }}>
          <span style={{ color: overFill ? "#ef4444" : "#6b7280", fontWeight: overFill ? 600 : 400 }}>
            {fmtDim(usedMM, unit)} / {fmtDim(shelfWidthMM, unit)} used ({fillPct.toFixed(1)}%)
            {unknownCount > 0 && <span style={{ color: "#f59e0b" }}> {"\u00b7"} {unknownCount} without dims</span>}
          </span>
          <span style={{ color: overFill ? "#ef4444" : "#10b981" }}>
            {overFill ? `Over by ${fmtDim(Math.abs(remainMM), unit)}` : `${fmtDim(remainMM, unit)} remaining`}
          </span>
        </div>
      )}
      {!cleanView && clipboard.length > 0 && (
        <button onClick={() => onPaste(index)} style={{ marginTop: 1, marginLeft: 4, fontSize: 11, color: "#22c55e", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>{"\u2935"} Paste {clipboard.length}</button>
      )}
    </div>
  );
}

// ══════════════════════════════════════
//  Unit Selector
// ══════════════════════════════════════
function UnitSelector({ value, onChange }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
      <span style={{ fontSize: 11, color: "#6b7280" }}>Units:</span>
      {Object.entries(UNITS).map(([key, u]) => (
        <button key={key} onClick={() => onChange(key)} style={{ padding: "3px 8px", fontSize: 11, border: "1px solid", cursor: "pointer", borderRadius: 4, background: value === key ? "#3b82f6" : "#fff", color: value === key ? "#fff" : "#6b7280", borderColor: value === key ? "#3b82f6" : "#d1d5db" }}>{u.label}</button>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  PLANOGRAM BUILDER (forwardRef, accepts initialData + isEmbedded)
// ═══════════════════════════════════════════════════════════════
const PlanogramBuilder = React.forwardRef(function PlanogramBuilder({ initialData, isEmbedded }, ref) {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [unit, setUnit] = useState("inches");
  const [shelves, setShelves] = useState([
    { id: "s1", height: DEFAULT_SHELF_H, products: [] },
    { id: "s2", height: DEFAULT_SHELF_H, products: [] },
    { id: "s3", height: DEFAULT_SHELF_H, products: [] },
    { id: "s4", height: DEFAULT_SHELF_H, products: [] },
  ]);
  const [planogramTitle, setPlanogramTitle] = useState("New Planogram");
  const [editingTitle, setEditingTitle] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [clipboard, setClipboard] = useState([]);
  const [editTarget, setEditTarget] = useState(null);
  const [modal, setModal] = useState(null);
  const [saves, setSaves] = useState([]);
  const [toast, setToast] = useState(null);
  const [cleanView, setCleanView] = useState(false);
  const [shelfThickness, setShelfThickness] = useState(Math.round(1.5 * ONE_INCH_MM));
  const [shelfWidthMM, setShelfWidthMM] = useState(Math.round(48 * 25.4));
  const [zoom, setZoom] = useState(100);
  const shelfAreaRef = useRef(null);
  const [shelfAreaH, setShelfAreaH] = useState(600);

  // Load initialData on mount
  useEffect(() => {
    if (!initialData) return;
    let d;
    try { d = typeof initialData === "string" ? JSON.parse(initialData) : initialData; } catch(e) { return; }
    if (d.shelves) {
      setShelves(d.shelves.map(s => ({
        ...s, id: s.id || uid(), height: s.height || DEFAULT_SHELF_H,
        products: (s.products || []).map(p => ({
          ...p, _uid: p._uid || uid(), stacks: p.stacks || 1, facings: p.facings || 1,
          gap: p.gap != null ? p.gap : 0, cropT: p.cropT || 0, cropB: p.cropB || 0,
          cropL: p.cropL || 0, cropR: p.cropR || 0
        }))
      })));
    }
    if (d.title) setPlanogramTitle(d.title);
    if (d.unit) setUnit(d.unit);
    if (d.shelfWidthMM) setShelfWidthMM(d.shelfWidthMM);
    if (d.shelfThickness) setShelfThickness(d.shelfThickness);
  }, []);

  // Expose getState via ref
  React.useImperativeHandle(ref, () => ({
    getState: () => ({
      title: planogramTitle,
      date: new Date().toISOString(),
      unit,
      shelfWidthMM,
      shelfThickness,
      shelves: shelves.map(s => ({
        ...s,
        products: s.products.map(({ _uid, ...rest }) => rest)
      }))
    })
  }), [planogramTitle, unit, shelfWidthMM, shelfThickness, shelves]);

  useEffect(() => {
    if (!shelfAreaRef.current) return;
    const ro = new ResizeObserver((entries) => { for (const e of entries) setShelfAreaH(e.contentRect.height); });
    ro.observe(shelfAreaRef.current);
    return () => ro.disconnect();
  }, []);

  const totalShelfContentMM = shelves.reduce((sum, s) => sum + (s.height || DEFAULT_SHELF_H), 0) + shelves.length * shelfThickness;
  const approxContainerW = shelfAreaRef.current ? shelfAreaRef.current.clientWidth - 32 : 800;
  const basePxPerMM = approxContainerW / shelfWidthMM;
  const baseContentPx = totalShelfContentMM * basePxPerMM;
  const uiChromePx = shelves.length * 36 + 40;
  const fitZoom = shelfAreaH > 0 && baseContentPx > 0 ? Math.max(10, Math.min(100, Math.round(((shelfAreaH - uiChromePx) / baseContentPx) * 100))) : 100;
  const zoomPct = zoom === "fit" ? fitZoom : zoom;
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2000); };

  const searchProducts = useCallback(
    debounce(async (q) => {
      if (!q || q.length < 2) { setResults([]); return; }
      setLoading(true); setError(null);
      try {
        const res = await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms=" + encodeURIComponent(q) + "&search_simple=1&action=process&json=1&page_size=25&fields=code,product_name,brands,image_front_small_url,image_url");
        const data = await res.json();
        const cache = loadDimCache();
        setResults((data.products || []).filter(p => p.product_name).map(p => {
          const cached = cache[p.code];
          return { id: p.code || uid(), name: p.product_name, brand: p.brands || "", image_url: p.image_front_small_url || p.image_url || "", width: cached ? cached.width : null, height: cached ? cached.height : null, depth: cached ? cached.depth : null, cropT: cached ? cached.cropT || 0 : 0, cropB: cached ? cached.cropB || 0 : 0, cropL: cached ? cached.cropL || 0 : 0, cropR: cached ? cached.cropR || 0 : 0, barcode: p.code, hasCachedDims: !!cached };
        }));
      } catch(ex) { setError("Search failed."); setResults([]); }
      setLoading(false);
    }, 400), []);

  useEffect(() => { searchProducts(query); }, [query]);

  const handleDrop = (si, product) => {
    const cache = loadDimCache();
    const cached = product.barcode ? cache[product.barcode] : null;
    const p = { ...product, _uid: uid(), facings: 1, stacks: 1, gap: 0, width: product.width || (cached ? cached.width : null), height: product.height || (cached ? cached.height : null), depth: product.depth || (cached ? cached.depth : null), cropT: product.cropT || (cached ? cached.cropT || 0 : 0), cropB: product.cropB || (cached ? cached.cropB || 0 : 0), cropL: product.cropL || (cached ? cached.cropL || 0 : 0), cropR: product.cropR || (cached ? cached.cropR || 0 : 0) };
    setShelves(prev => prev.map((s, i) => i === si ? { ...s, products: [...s.products, p] } : s));
  };
  const updateProducts = (si, products) => setShelves(p => p.map((s, i) => i === si ? { ...s, products } : s));
  const addShelf = () => setShelves(p => [...p, { id: uid(), height: DEFAULT_SHELF_H, products: [] }]);
  const removeShelf = (i) => { if (shelves.length <= 1) return; setShelves(p => p.filter((_, j) => j !== i)); };
  const moveShelf = (i, d) => setShelves(p => { const a = [...p]; const t = i + d; if (t < 0 || t >= a.length) return a; [a[i], a[t]] = [a[t], a[i]]; return a; });
  const resizeShelf = (i, h) => setShelves(p => p.map((s, j) => j === i ? { ...s, height: h } : s));
  const clearAll = () => { setShelves(p => p.map(s => ({ ...s, products: [] }))); setSelected(new Set()); };

  const handleSelect = (si, pi, _uid, e) => { setSelected(prev => { const n = new Set(e.shiftKey || e.ctrlKey || e.metaKey ? prev : []); if (n.has(_uid)) n.delete(_uid); else n.add(_uid); return n; }); };
  const selectAll = () => { const a = new Set(); shelves.forEach(s => s.products.forEach(p => a.add(p._uid))); setSelected(a); };
  const deselectAll = () => setSelected(new Set());

  const copySelected = useCallback(() => { const items = []; shelves.forEach(s => s.products.forEach(p => { if (selected.has(p._uid)) items.push({ ...p }); })); if (!items.length) return; setClipboard(items); showToast("Copied " + items.length); }, [shelves, selected]);
  const pasteToShelf = (si) => { if (!clipboard.length) return; setShelves(p => p.map((s, i) => i === si ? { ...s, products: [...s.products, ...clipboard.map(c => ({ ...c, _uid: uid() }))] } : s)); showToast("Pasted " + clipboard.length); };
  const deleteSelected = useCallback(() => { if (!selected.size) return; setShelves(p => p.map(s => ({ ...s, products: s.products.filter(p => !selected.has(p._uid)) }))); showToast("Deleted " + selected.size); setSelected(new Set()); }, [selected]);
  const resetDimsSelected = useCallback(() => {
    if (!selected.size) return;
    setShelves(p => p.map(s => ({ ...s, products: s.products.map(p => {
      if (!selected.has(p._uid)) return p;
      if (p.barcode) { const cache = loadDimCache(); delete cache[p.barcode]; saveDimCache(cache); }
      return { ...p, width: null, height: null, depth: null, cropT: 0, cropB: 0, cropL: 0, cropR: 0 };
    }) })));
    showToast("Reset dims on " + selected.size);
  }, [selected]);

  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if ((e.ctrlKey || e.metaKey) && e.key === "c") { e.preventDefault(); copySelected(); }
      if ((e.ctrlKey || e.metaKey) && e.key === "a") { e.preventDefault(); selectAll(); }
      if (e.key === "Delete" || e.key === "Backspace") { if (selected.size) { e.preventDefault(); deleteSelected(); } }
      if (e.key === "Escape") deselectAll();
    };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, [copySelected, deleteSelected, selected]);

  useEffect(() => {
    const el = shelfAreaRef.current;
    if (!el) return;
    const onWheel = (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      setZoom(z => { const cur = z === "fit" ? fitZoom : z; const delta = e.deltaY > 0 ? -10 : 10; return Math.max(10, Math.min(200, cur + delta)); });
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, [fitZoom]);

  const handleEditDims = (si, pi) => setEditTarget({ shelfIdx: si, prodIdx: pi });
  const saveDims = (dims) => {
    const { shelfIdx, prodIdx } = editTarget;
    setShelves(p => p.map((s, i) => { if (i !== shelfIdx) return s; const pr = [...s.products]; pr[prodIdx] = { ...pr[prodIdx], ...dims }; return { ...s, products: pr }; }));
    setEditTarget(null);
  };

  const loadSaveList = async () => {
    try { const res = await storage.list("plano:"); const entries = []; for (const key of res.keys) { try { const it = await storage.get(key); const d = JSON.parse(it.value); entries.push({ key, name: d.title || key, shelves: d.shelves ? d.shelves.length : 0, products: d.shelves ? d.shelves.reduce((s, sh) => s + sh.products.length, 0) : 0, date: d.date }); } catch(ex) {} } entries.sort((a, b) => new Date(b.date) - new Date(a.date)); setSaves(entries); } catch(ex) { setSaves([]); }
  };
  const savePlanogram = async (name) => {
    const key = "plano:" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    try { await storage.set(key, JSON.stringify({ title: name, date: new Date().toISOString(), unit, shelfWidthMM, shelfThickness, shelves })); showToast("Saved: " + name); await loadSaveList(); } catch(ex) { showToast("Save failed"); }
  };
  const loadPlanogram = async (key) => {
    try { const res = await storage.get(key); const d = JSON.parse(res.value); setShelves(d.shelves.map(s => ({ ...s, height: s.height || DEFAULT_SHELF_H, products: s.products.map(p => ({ ...p, _uid: p._uid || uid(), stacks: p.stacks || 1, facings: p.facings || 1, gap: p.gap != null ? p.gap : 0, cropT: p.cropT || 0, cropB: p.cropB || 0, cropL: p.cropL || 0, cropR: p.cropR || 0 })) }))); setPlanogramTitle(d.title || "Loaded"); if (d.unit) setUnit(d.unit); if (d.shelfWidthMM) setShelfWidthMM(d.shelfWidthMM); if (d.shelfThickness) setShelfThickness(d.shelfThickness); setSelected(new Set()); setModal(null); showToast("Loaded!"); } catch(ex) { showToast("Load failed"); }
  };
  const deleteSave = async (key) => { try { await storage.delete(key); await loadSaveList(); showToast("Deleted"); } catch(ex) {} };

  const exportJSON = () => {
    const data = { title: planogramTitle, date: new Date().toISOString(), unit, shelfWidthMM, shelfThickness, shelves: shelves.map((s, i) => ({ label: "Shelf " + (i + 1), height: s.height, products: s.products.map(({ _uid, ...r }) => r) })) };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = planogramTitle.replace(/\s+/g, "_") + ".json"; a.click(); URL.revokeObjectURL(url); showToast("Exported");
  };
  const importRef = useRef();
  const importJSON = (e) => {
    const file = e.target.files ? e.target.files[0] : null; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (d.shelves) { setShelves(d.shelves.map(s => ({ id: s.id || uid(), height: s.height || DEFAULT_SHELF_H, products: (s.products || []).map(p => ({ ...p, _uid: uid(), stacks: p.stacks || 1, facings: p.facings || 1, gap: p.gap != null ? p.gap : 0, cropT: p.cropT || 0, cropB: p.cropB || 0, cropL: p.cropL || 0, cropR: p.cropR || 0 })) }))); setPlanogramTitle(d.title || "Imported"); if (d.unit) setUnit(d.unit); if (d.shelfWidthMM) setShelfWidthMM(d.shelfWidthMM); if (d.shelfThickness) setShelfThickness(d.shelfThickness); showToast("Imported!"); } } catch(ex) { showToast("Invalid file"); } };
    reader.readAsText(file); e.target.value = "";
  };

  const totalProducts = shelves.reduce((s, sh) => s + sh.products.length, 0);
  const tb = (bg) => ({ padding: "6px 10px", fontSize: 12, background: bg, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", whiteSpace: "nowrap" });

  return (
    <UnitCtx.Provider value={unit}>
      <div style={{ display: "flex", flexDirection: "row", height: "100%", width: "100%", overflow: "hidden", background: "#f3f4f6", fontFamily: "system-ui, sans-serif" }}>
        {toast && <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 2060, background: "#1f2937", color: "#fff", fontSize: 14, padding: "8px 16px", borderRadius: 8, boxShadow: "0 4px 12px rgba(0,0,0,0.3)" }}>{toast}</div>}
        {editTarget && <DimModal product={shelves[editTarget.shelfIdx].products[editTarget.prodIdx]} onSave={saveDims} onCancel={() => setEditTarget(null)} />}
        {(modal === "save" || modal === "load") && <SaveLoadModal mode={modal} saves={saves} onSave={(n) => { savePlanogram(n); setModal(null); }} onLoad={loadPlanogram} onDelete={deleteSave} onClose={() => setModal(null)} />}
        {modal === "templates" && <TemplateManagerModal onClose={() => setModal(null)} />}

        {!cleanView && (
        <div style={{ width: 280, minWidth: 280, maxWidth: 280, display: "flex", flexDirection: "column", background: "#fff", borderRight: "1px solid #e5e7eb", height: "100%", overflow: "hidden" }}>
          <div style={{ padding: 12, borderBottom: "1px solid #e5e7eb", flexShrink: 0 }}>
            <h2 style={{ fontSize: 13, fontWeight: 600, color: "#374151", marginBottom: 8 }}>Product Search</h2>
            <input type="text" value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search Open Food Facts..." style={{ width: "100%", boxSizing: "border-box", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 14, outline: "none" }} />
            <p style={{ fontSize: 11, color: "#9ca3af", marginTop: 4 }}>{"Drag to shelves \u00b7 Cached dims auto-apply"}</p>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 8 }}>
            {loading && <div style={{ textAlign: "center", padding: "32px 0", color: "#9ca3af", fontSize: 14 }}>Searching...</div>}
            {error && <div style={{ textAlign: "center", padding: "16px 0", color: "#f87171", fontSize: 14 }}>{error}</div>}
            {!loading && !error && results.length === 0 && query.length >= 2 && <div style={{ textAlign: "center", padding: "32px 0", color: "#9ca3af", fontSize: 14 }}>No results</div>}
            {!loading && query.length < 2 && <div style={{ textAlign: "center", padding: "32px 0", color: "#d1d5db", fontSize: 14 }}>Type 2+ chars</div>}
            {results.map(p => <ProductCard key={p.id} product={p} />)}
          </div>
          <div style={{ padding: 8, borderTop: "1px solid #f3f4f6", fontSize: 11, color: "#9ca3af", textAlign: "center", flexShrink: 0 }}>
            <a href="https://openfoodfacts.org" target="_blank" rel="noopener" style={{ textDecoration: "underline", color: "inherit" }}>Open Food Facts</a> (ODbL)
          </div>
        </div>
        )}

        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, height: "100%", overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", background: "#fff", borderBottom: "1px solid #e5e7eb", flexWrap: "wrap", gap: 8, flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {!cleanView && editingTitle ? (
                <input autoFocus value={planogramTitle} onChange={(e) => setPlanogramTitle(e.target.value)} onBlur={() => setEditingTitle(false)} onKeyDown={(e) => e.key === "Enter" && setEditingTitle(false)} style={{ fontSize: 18, fontWeight: 700, borderBottom: "2px solid #3b82f6", outline: "none", padding: "0 4px", background: "transparent", color: "#1f2937" }} />
              ) : (
                <h1 onClick={() => { if (!cleanView) setEditingTitle(true); }} style={{ fontSize: 18, fontWeight: 700, color: "#1f2937", cursor: cleanView ? "default" : "pointer", margin: 0 }}>{planogramTitle}</h1>
              )}
              <span style={{ fontSize: 12, color: "#9ca3af" }}>{shelves.length} shelves {" \u00b7 "} {totalProducts} products</span>
            </div>
            {!cleanView && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              {selected.size > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 4, marginRight: 4, padding: "4px 8px", background: "#eff6ff", borderRadius: 8, border: "1px solid #bfdbfe" }}>
                  <span style={{ fontSize: 12, color: "#2563eb", fontWeight: 500 }}>{selected.size} sel</span>
                  <button onClick={copySelected} style={{ ...tb("#3b82f6"), padding: "3px 6px" }}>Copy</button>
                  <button onClick={resetDimsSelected} style={{ ...tb("#f59e0b"), padding: "3px 6px" }}>Reset Dims</button>
                  <button onClick={deleteSelected} style={{ ...tb("#ef4444"), padding: "3px 6px" }}>Del</button>
                  <button onClick={deselectAll} style={{ background: "none", border: "none", fontSize: 12, color: "#6b7280", cursor: "pointer" }}>{" \u2715 "}</button>
                </div>
              )}
              {clipboard.length > 0 && <span style={{ fontSize: 12, color: "#16a34a", padding: "4px 8px", background: "#f0fdf4", borderRadius: 8, border: "1px solid #bbf7d0" }}>{clipboard.length} copied</span>}
              <button onClick={addShelf} style={tb("#3b82f6")}>+ Shelf</button>
              <button onClick={() => setModal("templates")} style={tb("#0891b2")}>Templates</button>
              {!isEmbedded && <button onClick={() => { loadSaveList(); setModal("save"); }} style={tb("#10b981")}>Save</button>}
              {!isEmbedded && <button onClick={() => { loadSaveList(); setModal("load"); }} style={tb("#f59e0b")}>Load</button>}
              <button onClick={exportJSON} style={tb("#8b5cf6")}>Export</button>
              <button onClick={() => importRef.current.click()} style={tb("#6b7280")}>Import</button>
              <input ref={importRef} type="file" accept=".json" onChange={importJSON} style={{ display: "none" }} />
              <button onClick={clearAll} style={{ ...tb("#e5e7eb"), color: "#4b5563" }}>Clear</button>
            </div>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 16px", flexShrink: 0, background: "#fafafa", borderBottom: "1px solid #f0f0f0", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <UnitSelector value={unit} onChange={setUnit} />
              <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280", cursor: "pointer" }}>
                <input type="checkbox" checked={cleanView} onChange={(e) => setCleanView(e.target.checked)} />
                Clean View
              </label>
              <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280" }}>
                Zoom:
                <button onClick={() => setZoom(z => { const cur = z === "fit" ? fitZoom : z; return Math.max(10, cur - 10); })} style={{ background: "#e5e7eb", border: "none", borderRadius: 3, padding: "1px 5px", cursor: "pointer", fontSize: 11 }}>{" \u2212 "}</button>
                <span style={{ minWidth: 30, textAlign: "center" }}>{zoomPct}%</span>
                <button onClick={() => setZoom(z => { const cur = z === "fit" ? fitZoom : z; return Math.min(200, cur + 10); })} style={{ background: "#e5e7eb", border: "none", borderRadius: 3, padding: "1px 5px", cursor: "pointer", fontSize: 11 }}>+</button>
                <button onClick={() => setZoom(100)} style={{ background: "#e5e7eb", border: "none", borderRadius: 3, padding: "1px 5px", cursor: "pointer", fontSize: 11 }}>100%</button>
                <button onClick={() => setZoom("fit")} style={{ background: "#dbeafe", border: "1px solid #bfdbfe", borderRadius: 3, padding: "1px 6px", cursor: "pointer", fontSize: 11, color: "#2563eb" }}>Fit All</button>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280" }}>
                Shelf W:
                <input type="number" step="any" value={fromMM(shelfWidthMM, unit)} onChange={(e) => { const v = toMM(e.target.value, unit); if (v && v > 0) setShelfWidthMM(v); }} style={{ width: 52, border: "1px solid #d1d5db", borderRadius: 3, padding: "1px 4px", fontSize: 11, textAlign: "center" }} />
                {UNITS[unit].label}
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#6b7280" }}>
                Board:
                <input type="number" step="any" value={fromMM(shelfThickness, unit)} onChange={(e) => { const v = toMM(e.target.value, unit); if (v != null && v >= 0) setShelfThickness(v); }} style={{ width: 42, border: "1px solid #d1d5db", borderRadius: 3, padding: "1px 4px", fontSize: 11, textAlign: "center" }} />
                {UNITS[unit].label}
              </label>
              {!cleanView && <span style={{ fontSize: 10, color: "#b0b0b0" }}>Dbl-click=edit/crop</span>}
            </div>
          </div>
          <div ref={shelfAreaRef} style={{ flex: 1, overflowY: "auto", overflow: "auto", padding: 16 }}>
            <div style={{ margin: "0 auto", padding: "0 8px", maxWidth: zoomPct + "%" }}>
              {shelves.map((shelf, idx) => (
                <Shelf key={shelf.id} shelf={shelf} index={idx} total={shelves.length} onDrop={handleDrop} onUpdateProducts={updateProducts} onMoveUp={() => moveShelf(idx, -1)} onMoveDown={() => moveShelf(idx, 1)} onRemoveShelf={() => removeShelf(idx)} onResizeShelf={resizeShelf} selected={selected} onSelect={handleSelect} onEdit={handleEditDims} clipboard={clipboard} onPaste={pasteToShelf} cleanView={cleanView} shelfThickness={shelfThickness} shelfWidthMM={shelfWidthMM} />
              ))}
            </div>
          </div>
        </div>
      </div>
    </UnitCtx.Provider>
  );
});

// ═══════════════════════════════════════════════════════════════
//  PLANOGRAM MODAL (wraps PlanogramBuilder)
// ═══════════════════════════════════════════════════════════════
function PlanogramModal({ initialData, onSave, onCancel }) {
  const builderRef = useRef(null);
  const handleSave = () => {
    if (builderRef.current) {
      const state = builderRef.current.getState();
      onSave(JSON.stringify(state));
    }
  };
  return (
    <div className="plano-modal-overlay">
      <div className="plano-modal-topbar">
        <h2>Planogram Builder</h2>
        <div className="plano-actions">
          <button className="btn" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}>Save & Close</button>
        </div>
      </div>
      <div className="plano-modal-body">
        <PlanogramBuilder ref={builderRef} initialData={initialData} isEmbedded={true} />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  DISPLAY FORM MODAL (Add/Edit)
// ═══════════════════════════════════════════════════════════════
function DisplayFormModal({ record, isEdit, mapB64, onSave, onClose, onBuildPlanogram }) {
  const [location, setLocation] = useState(record ? record.location : LOCATION_FLAT[0].code);
  const [otherLocation, setOtherLocation] = useState(record ? record.otherLocation || "" : "");
  const [displayType, setDisplayType] = useState(record ? record.displayType : "Endcap");
  const [product, setProduct] = useState(record ? record.product : "");
  const [vendor, setVendor] = useState(record ? record.vendor : "");
  const [directive, setDirective] = useState(record ? record.directive : "Store Discretion");
  const [status, setStatus] = useState(record ? record.status : "scheduled");
  const [setupDate, setSetupDate] = useState(record ? record.setupDate || "" : "");
  const [expectedLife, setExpectedLife] = useState(record ? (record.permanent ? "" : (record.expectedLife || 14)) : 14);
  const [permanent, setPermanent] = useState(record ? record.permanent || false : false);
  const [notes, setNotes] = useState(record ? record.notes || "" : "");
  const [tempMods, setTempMods] = useState([...(record ? record.modifications || [] : [])]);
  const [modType, setModType] = useState("");
  const [modProduct, setModProduct] = useState("");
  const [mapZoomed, setMapZoomed] = useState(false);

  const readForm = () => ({
    location, otherLocation, displayType, product: product.trim(), vendor: vendor.trim(),
    directive, status, setupDate, expectedLife: permanent ? 0 : (parseInt(expectedLife) || 14),
    permanent, notes: notes.trim(), modifications: tempMods,
    planogramData: record ? record.planogramData || null : null
  });

  const handleSave = () => {
    const data = readForm();
    if (!data.product) return;
    if (data.location === "__other__" && !data.otherLocation) return;
    onSave(data);
  };

  const handleBuildPlanogram = () => {
    const data = readForm();
    if (!data.product) return;
    if (data.location === "__other__" && !data.otherLocation) return;
    onBuildPlanogram(data);
  };

  const addMod = () => {
    if (!modType) return;
    const det = modType === "Additional Product Incorporated" ? modProduct.trim() : "";
    if (modType === "Additional Product Incorporated" && !det) return;
    setTempMods(prev => [...prev, { type: modType, date: new Date().toISOString(), detail: det }]);
    setModType(""); setModProduct("");
  };

  const removeMod = (i) => setTempMods(prev => prev.filter((_, j) => j !== i));

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-layout" onClick={e => e.stopPropagation()}>
        <div className={"modal" + (!mapB64 ? " no-map" : "")}>
          <div className="modal-header">
            <h2>{isEdit ? "Edit Display" : "New Display"}</h2>
            <button className="modal-close" onClick={onClose}>\u00d7</button>
          </div>
          <div className="modal-body">
            <div className="form-grid">
              <div className="form-group">
                <label>Location *</label>
                <select value={location} onChange={e => setLocation(e.target.value)}>
                  {buildLocOptions().map(g => (
                    <optgroup key={g.group} label={g.group}>
                      {g.codes.map(c => <option key={c} value={c}>{c}</option>)}
                    </optgroup>
                  ))}
                  <optgroup label="Other"><option value="__other__">Other (custom)...</option></optgroup>
                </select>
              </div>
              {location === "__other__" && (
                <div className="form-group">
                  <label>Custom Location</label>
                  <input value={otherLocation} onChange={e => setOtherLocation(e.target.value)} placeholder="Describe the location" />
                </div>
              )}
              <div className="form-group">
                <label>Display Type *</label>
                <select value={displayType} onChange={e => setDisplayType(e.target.value)}>
                  {DISPLAY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group full">
                <label>Product Name *</label>
                <input value={product} onChange={e => setProduct(e.target.value)} placeholder="Product description" />
              </div>
              <div className="form-group">
                <label>Vendor</label>
                <input value={vendor} onChange={e => setVendor(e.target.value)} placeholder="Vendor / distributor" />
              </div>
              <div className="form-group">
                <label>Corporate Directive</label>
                <select value={directive} onChange={e => setDirective(e.target.value)}>
                  {DIRECTIVE_TAGS.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Status</label>
                <select value={status} onChange={e => setStatus(e.target.value)}>
                  {STATUS_OPTIONS.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Setup Date</label>
                <input type="date" value={setupDate} onChange={e => setSetupDate(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Expected Life (days)</label>
                <input type="number" value={expectedLife} onChange={e => setExpectedLife(e.target.value)} min="1" disabled={permanent} />
                <div className="checkbox-row">
                  <input type="checkbox" id="fPermanent" checked={permanent} onChange={e => { setPermanent(e.target.checked); if (e.target.checked) setExpectedLife(""); else setExpectedLife(14); }} />
                  <label htmlFor="fPermanent">Permanent display</label>
                </div>
              </div>
              {isEdit && (
                <div className="form-group full">
                  <label>Modifications</label>
                  <div className="mod-form-section">
                    <div className="mod-form-row">
                      <div className="form-group" style={{gap:5}}>
                        <select value={modType} onChange={e => setModType(e.target.value)}>
                          <option value="">Add a modification...</option>
                          <option value="Moved">Moved</option>
                          <option value="Combined">Combined</option>
                          <option value="Downsized to Metro">Downsized to Metro</option>
                          <option value="Additional Product Incorporated">Additional Product Incorporated</option>
                        </select>
                      </div>
                      <button className="btn btn-sm btn-primary" onClick={addMod} style={{height:35}}>+ Add</button>
                    </div>
                    {modType === "Additional Product Incorporated" && (
                      <div className="form-group" style={{marginTop:8,gap:5}}>
                        <input value={modProduct} onChange={e => setModProduct(e.target.value)} placeholder="What product was added?" />
                      </div>
                    )}
                    {tempMods.length > 0 && (
                      <div className="mod-history">
                        {tempMods.map((m, i) => (
                          <div key={i} className="mod-history-item">
                            <div>
                              <span className="mod-badge">{m.type}</span>
                              {m.detail && <span style={{color:"var(--text2)",fontSize:11,marginLeft:4}}>{" \u2014 "}{m.detail}</span>}
                              <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text3)",marginLeft:6}}>{fmtDateTime(m.date)}</span>
                            </div>
                            <button style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:14,padding:"0 4px"}} onClick={() => removeMod(i)}>\u2715</button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}
              <div className="form-group full">
                <label>Notes</label>
                <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Vendor rep visits, special instructions, etc." />
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="btn" onClick={onClose}>Cancel</button>
            {isEdit && <button className="btn btn-transition" onClick={handleBuildPlanogram} title="Open planogram builder for this display">{"\ud83d\udcd0"} Build Planogram</button>}
            <button className="btn btn-primary" onClick={handleSave}>{isEdit ? "Save Changes" : "Add Display"}</button>
          </div>
        </div>
        {mapB64 && (
          <div className="modal-map">
            <div className="modal-map-header">{"\ud83d\udccd"} Store Map Reference</div>
            <div className={"modal-map-body" + (mapZoomed ? " zoomed" : "")} onClick={() => setMapZoomed(!mapZoomed)}>
              <img src={mapB64} alt="Store floor plan" />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  TRANSITION WIZARD
// ═══════════════════════════════════════════════════════════════
function TransitionWizard({ record, onExecute, onClose }) {
  const loc = getLocDisp(record);
  const [newLocation, setNewLocation] = useState(LOCATION_FLAT[0].code);
  const [newOtherLocation, setNewOtherLocation] = useState("");
  const [newDisplayType, setNewDisplayType] = useState("Endcap");
  const [newSetupDate, setNewSetupDate] = useState(todayStr());
  const [newLife, setNewLife] = useState(14);
  const [wantsReplace, setWantsReplace] = useState(false);
  const [replaceProduct, setReplaceProduct] = useState("");
  const [replaceVendor, setReplaceVendor] = useState("");
  const [replaceDisplayType, setReplaceDisplayType] = useState(record.displayType);
  const [replaceDirective, setReplaceDirective] = useState("Store Discretion");
  const [replaceSetupDate, setReplaceSetupDate] = useState(todayStr());
  const [replaceLife, setReplaceLife] = useState(14);

  const handleExecute = () => {
    if (newLocation === "__other__" && !newOtherLocation.trim()) return;
    if (wantsReplace && !replaceProduct.trim()) return;
    onExecute({
      newLocation, newOtherLocation: newOtherLocation.trim(), newDisplayType, newSetupDate,
      newLife: parseInt(newLife) || 14,
      wantsReplace, replaceProduct: replaceProduct.trim(), replaceVendor: replaceVendor.trim(),
      replaceDisplayType, replaceDirective, replaceSetupDate, replaceLife: parseInt(replaceLife) || 14
    });
  };

  return (
    <div className="transition-overlay" onClick={onClose}>
      <div className="transition-wizard" onClick={e => e.stopPropagation()}>
        <div className="tw-header">
          <h2><span className="tw-icon">{"\u26a1"}</span> Transition Display</h2>
          <p>Move "{record.product}" from {loc} to a new location. The original will be archived.</p>
        </div>
        <div className="tw-body">
          <div className="tw-section">
            <h3 className="expire-title">{"\u2460"} Current Display {"\u2192"} Archived</h3>
            <div className="tw-summary">
              <strong>{record.product}</strong> at <strong>{loc}</strong> ({record.displayType})<br/>
              Vendor: {record.vendor || "\u2014"} {"\u00b7"} Directive: {record.directive}
            </div>
          </div>
          <div className="tw-section">
            <h3 className="new-title">{"\u2461"} New Display {"\u2014"} Same Product {"\u2192"} Active</h3>
            <div className="tw-grid">
              <div className="form-group">
                <label>New Location *</label>
                <select value={newLocation} onChange={e => setNewLocation(e.target.value)}>
                  {buildLocOptions().map(g => (
                    <optgroup key={g.group} label={g.group}>
                      {g.codes.map(c => <option key={c} value={c}>{c}</option>)}
                    </optgroup>
                  ))}
                  <optgroup label="Other"><option value="__other__">Other (custom)...</option></optgroup>
                </select>
              </div>
              {newLocation === "__other__" && (
                <div className="form-group">
                  <label>Custom Location</label>
                  <input value={newOtherLocation} onChange={e => setNewOtherLocation(e.target.value)} placeholder="Describe" />
                </div>
              )}
              <div className="form-group">
                <label>New Display Type *</label>
                <select value={newDisplayType} onChange={e => setNewDisplayType(e.target.value)}>
                  {DISPLAY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label>Setup Date</label>
                <input type="date" value={newSetupDate} onChange={e => setNewSetupDate(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Expected Life (days)</label>
                <input type="number" value={newLife} onChange={e => setNewLife(e.target.value)} min="1" />
              </div>
            </div>
          </div>
          <div className="tw-section">
            <h3 className="replace-title">{"\u2462"} Replacement {"\u2014"} What Goes In The Old Spot (Optional)</h3>
            <div className="checkbox-row" style={{paddingTop:0,marginBottom:10}}>
              <input type="checkbox" checked={wantsReplace} onChange={e => setWantsReplace(e.target.checked)} id="twReplace" />
              <label htmlFor="twReplace">Enter replacement display for the old location</label>
            </div>
            {wantsReplace && (
              <div className="tw-grid">
                <div className="form-group full">
                  <label>Replacement Product *</label>
                  <input value={replaceProduct} onChange={e => setReplaceProduct(e.target.value)} placeholder="New product name" />
                </div>
                <div className="form-group">
                  <label>Vendor</label>
                  <input value={replaceVendor} onChange={e => setReplaceVendor(e.target.value)} placeholder="Vendor (optional)" />
                </div>
                <div className="form-group">
                  <label>Display Type</label>
                  <select value={replaceDisplayType} onChange={e => setReplaceDisplayType(e.target.value)}>
                    {DISPLAY_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Directive</label>
                  <select value={replaceDirective} onChange={e => setReplaceDirective(e.target.value)}>
                    {DIRECTIVE_TAGS.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Setup Date</label>
                  <input type="date" value={replaceSetupDate} onChange={e => setReplaceSetupDate(e.target.value)} />
                </div>
                <div className="form-group">
                  <label>Expected Life (days)</label>
                  <input type="number" value={replaceLife} onChange={e => setReplaceLife(e.target.value)} min="1" />
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="tw-footer">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleExecute}>{"\u26a1"} Execute Transition</button>
        </div>
      </div>
    </div>
  );
}

          {record.planogramData && <button className="btn btn-print" onClick={() => onViewPlanogram(record.id)}>{"\ud83d\udcd0"} View Planogram</button>}
