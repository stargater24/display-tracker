// ═══════════════════════════════════════════════════════════════
//  MAP MODAL
// ═══════════════════════════════════════════════════════════════
function MapModal({ mapB64, onUpload, onClose }) {
  const fileRef = useRef(null);
  const handleFile = (e) => {
    const file = e.target.files ? e.target.files[0] : null;
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const data = ev.target.result;
      try {
        localStorage.setItem("store-map-b64", data);
        onUpload(data);
      } catch (err) {
        alert("Image is too large to save. Please upload a smaller image (under ~3MB).");
      }
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  return (
    <div className="map-overlay" onClick={onClose}>
      <div className="map-viewer" onClick={e => e.stopPropagation()}>
        <div className="map-viewer-header">
          <h2>{"\ud83d\uddfa"} Store Floor Plan</h2>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-sm" onClick={() => fileRef.current.click()}>Upload Map</button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}} />
            <button className="modal-close" onClick={onClose}>\u00d7</button>
          </div>
        </div>
        <div className="map-viewer-body">
          {mapB64 ? (
            <img src={mapB64} alt="Store floor plan" />
          ) : (
            <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}>
              <p style={{fontSize:14,marginBottom:12}}>No map uploaded yet.</p>
              <button className="btn btn-primary" onClick={() => fileRef.current.click()}>Upload Store Map Image</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  APP (root component)
// ═══════════════════════════════════════════════════════════════
//  PRINT SHEET (declarative, React-rendered)
// ═══════════════════════════════════════════════════════════════
const noop = () => {};
function PrintSheet({ selectedRecords, includePlanoInPrint }) {
  if (!selectedRecords.length) return null;
  return (
    <div className="print-sheet">
      <div className="ps-header">
        <h1>Display Location Reference</h1>
        <p>Printed {new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" })} {"\u00b7"} {selectedRecords.length} display{selectedRecords.length > 1 ? "s" : ""}</p>
      </div>
      {selectedRecords.map(r => {
        const loc = getLocDisp(r);
        const lg = getLocGroup(r.location);
        const plano = includePlanoInPrint ? parsePlanogramData(r.planogramData) : null;
        return (
          <div key={r.id} className="ps-card">
            <div className="ps-loc">{loc}</div>
            <div className="ps-type">{r.displayType}{lg ? " \u00b7 " + lg : ""}</div>
            <div className="ps-product">{r.product}</div>
            {r.notes && (
              <React.Fragment>
                <div className="ps-notes-label">Notes</div>
                <div className="ps-notes">{r.notes}</div>
              </React.Fragment>
            )}
            <div className="ps-meta">
              <span>{r.directive}</span>
              {r.permanent ? <span>Permanent</span> : r.setupDate ? <span>Setup: {fmtDateShort(r.setupDate)}</span> : null}
              {!r.permanent && r.expectedLife ? <span>{r.expectedLife}d life</span> : null}
            </div>
            {plano && plano.shelves && plano.shelves.length > 0 && (
              <div className="ps-plano">
                <h4>Planogram: {plano.title || "Untitled"}</h4>
                <UnitCtx.Provider value={plano.unit || "inches"}>
                  {plano.shelves.map((shelf, idx) => (
                    <Shelf
                      key={shelf.id || idx}
                      shelf={{...shelf, products: (shelf.products || []).map(p => ({...p, _uid: p._uid || uid()}))}}
                      index={idx}
                      total={plano.shelves.length}
                      onDrop={noop} onUpdateProducts={noop} onMoveUp={noop} onMoveDown={noop}
                      onRemoveShelf={noop} onResizeShelf={noop} onSelect={noop} onEdit={noop} onPaste={noop}
                      selected={new Set()} clipboard={[]}
                      cleanView={true}
                      shelfThickness={plano.shelfThickness || Math.round(1.5 * ONE_INCH_MM)}
                      shelfWidthMM={plano.shelfWidthMM || Math.round(48 * 25.4)}
                    />
                  ))}
                </UnitCtx.Provider>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  GITHUB SETTINGS MODAL
// ═══════════════════════════════════════════════════════════════
function SettingsModal({ onClose, onSaved }) {
  const existing = GitHubSync.getConfig() || {};
  const [token, setToken] = useState(existing.token || "");
  const [owner, setOwner] = useState(existing.owner || "");
  const [repo, setRepo] = useState(existing.repo || "");
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    GitHubSync.saveConfig({ token: token.trim(), owner: owner.trim(), repo: repo.trim() });
    try {
      await GitHubSync.testConnection();
      setTestResult({ ok: true, msg: "Connected successfully!" });
    } catch (err) {
      setTestResult({ ok: false, msg: err.message });
    }
    setTesting(false);
  };

  const handleSave = () => {
    GitHubSync.saveConfig({ token: token.trim(), owner: owner.trim(), repo: repo.trim() });
    onSaved();
    onClose();
  };

  const handleDisconnect = () => {
    GitHubSync.clearConfig();
    setToken(""); setOwner(""); setRepo("");
    setTestResult(null);
    onSaved();
  };

  const canSave = token.trim() && owner.trim() && repo.trim();

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,width:460,maxWidth:"90vw",maxHeight:"90vh",overflow:"auto",animation:"slideUp .2s ease"}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h2>GitHub Sync Settings</h2><button className="modal-close" onClick={onClose}>{"\u2715"}</button></div>
        <div className="modal-body">
          <p style={{fontSize:12,color:"var(--text2)",marginBottom:16,lineHeight:1.5}}>
            Connect to a GitHub repository to share display data across your team. Each team member needs their own Personal Access Token (PAT) with <strong>repo</strong> scope.
          </p>
          <div style={{marginBottom:12,padding:10,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6}}>
            <details style={{fontSize:12,color:"var(--text2)"}}>
              <summary style={{cursor:"pointer",fontWeight:600,color:"var(--text)",marginBottom:8}}>How to create a GitHub PAT</summary>
              <ol style={{paddingLeft:16,lineHeight:1.8}}>
                <li>Go to github.com {"\u2192"} Settings {"\u2192"} Developer settings</li>
                <li>Click "Personal access tokens" {"\u2192"} "Tokens (classic)"</li>
                <li>Click "Generate new token (classic)"</li>
                <li>Name it "Display Tracker", select the <strong>repo</strong> scope</li>
                <li>Click "Generate token" and copy it</li>
              </ol>
            </details>
          </div>
          <div className="form-grid" style={{gridTemplateColumns:"1fr"}}>
            <div className="form-group">
              <label>GitHub Personal Access Token</label>
              <input type="password" value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autoComplete="off" />
            </div>
            <div className="form-group" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="form-group">
                <label>Repository Owner</label>
                <input value={owner} onChange={e=>setOwner(e.target.value)} placeholder="username or org" />
              </div>
              <div className="form-group">
                <label>Repository Name</label>
                <input value={repo} onChange={e=>setRepo(e.target.value)} placeholder="display-tracker" />
              </div>
            </div>
          </div>
          {testResult && (
            <div style={{marginTop:12,padding:10,borderRadius:6,fontSize:12,fontWeight:500,background:testResult.ok?"rgba(52,199,89,.1)":"rgba(255,59,48,.1)",color:testResult.ok?"var(--green)":"var(--red)",border:"1px solid "+(testResult.ok?"rgba(52,199,89,.3)":"rgba(255,59,48,.3)")}}>
              {testResult.ok ? "\u2713 " : "\u2717 "}{testResult.msg}
            </div>
          )}
        </div>
        <div className="modal-footer">
          {existing.token && <button className="btn btn-danger btn-sm" onClick={handleDisconnect} style={{marginRight:"auto"}}>Disconnect</button>}
          <button className="btn" onClick={handleTest} disabled={!canSave || testing}>{testing ? "Testing..." : "Test Connection"}</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!canSave}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SYNC STATUS INDICATOR
// ═══════════════════════════════════════════════════════════════
function SyncIndicator({ syncState, onRefresh, onOpenSettings }) {
  const { status, lastSync } = syncState;
  const dotColors = { idle: "var(--text3)", syncing: "var(--orange)", synced: "var(--green)", error: "var(--red)", offline: "var(--text3)" };
  const labels = { idle: "Not connected", syncing: "Syncing...", synced: "Synced", error: "Sync error", offline: "Offline" };
  const isConfigured = GitHubSync.isConfigured();

  const timeAgo = lastSync ? (() => {
    const s = Math.floor((new Date() - lastSync) / 1000);
    if (s < 60) return "just now";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    return Math.floor(s / 3600) + "h ago";
  })() : null;

  return (
    <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--text3)"}}>
      {isConfigured ? (
        <React.Fragment>
          <span style={{width:7,height:7,borderRadius:"50%",background:dotColors[status]||"var(--text3)",display:"inline-block",animation:status==="syncing"?"pulse 1s infinite":""}} />
          <span style={{cursor:"default"}} title={timeAgo ? "Last synced: " + timeAgo : ""}>{labels[status] || status}{timeAgo && status === "synced" ? " \u00b7 " + timeAgo : ""}</span>
          <button onClick={onRefresh} className="btn btn-sm" style={{padding:"2px 6px",fontSize:10,borderColor:"transparent"}} title="Refresh from GitHub">{"\u21bb"}</button>
        </React.Fragment>
      ) : (
        <button onClick={onOpenSettings} className="btn btn-sm" style={{fontSize:10,padding:"3px 8px"}}>Connect GitHub</button>
      )}
      <button onClick={onOpenSettings} className="btn btn-sm" style={{padding:"2px 6px",fontSize:10,borderColor:"transparent"}} title="Sync Settings">{"\u2699"}</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
function App() {
  const [initialData] = useState(() => loadStoredData());
  const [records, setRecords] = useState(initialData.records);
  const [nextId, setNextId] = useState(initialData.nextId);
  const [statusFilter, setStatusFilter] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [sortCol, setSortCol] = useState(null);
  const [sortAsc, setSortAsc] = useState(true);
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [formModal, setFormModal] = useState(null); // null | "add" | record object
  const [transitionSourceId, setTransitionSourceId] = useState(null);
  const [detailId, setDetailId] = useState(null);
  const [showMap, setShowMap] = useState(false);
  const [planogramEntryId, setPlanogramEntryId] = useState(null);
  const [mapB64, setMapB64] = useState(() => localStorage.getItem("store-map-b64") || "");
  const [includePlanoInPrint, setIncludePlanoInPrint] = useState(true);
  const [showSettings, setShowSettings] = useState(false);
  const [syncState, setSyncState] = useState({ status: GitHubSync.isConfigured() ? "idle" : "idle", lastSync: null });

  // Subscribe to sync status changes
  useEffect(() => {
    return GitHubSync.onStatusChange((s) => setSyncState({ ...s }));
  }, []);

  // Load from GitHub on mount (if configured)
  useEffect(() => {
    if (!GitHubSync.isConfigured()) return;
    GitHubSync.load().then((data) => {
      if (data && data.records) {
        setRecords(data.records.map(r => ({ ...r, planogramData: r.planogramData || null })));
        if (data.nextId) setNextId(data.nextId);
        // Hydrate templates and dim cache into localStorage for component access
        if (data.templates) localStorage.setItem("plano-dim-templates", JSON.stringify(data.templates));
        if (data.dimCache) localStorage.setItem("plano-dim-cache", JSON.stringify(data.dimCache));
        if (data.planograms) Object.entries(data.planograms).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
      }
    });
  }, []);

  const handleRefreshFromGitHub = useCallback(async () => {
    const data = await GitHubSync.load();
    if (data && data.records) {
      setRecords(data.records.map(r => ({ ...r, planogramData: r.planogramData || null })));
      if (data.nextId) setNextId(data.nextId);
      if (data.templates) localStorage.setItem("plano-dim-templates", JSON.stringify(data.templates));
      if (data.dimCache) localStorage.setItem("plano-dim-cache", JSON.stringify(data.dimCache));
      if (data.planograms) Object.entries(data.planograms).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
    }
  }, []);

  const handleSettingsSaved = useCallback(() => {
    if (GitHubSync.isConfigured()) handleRefreshFromGitHub();
  }, [handleRefreshFromGitHub]);

  // Auto-save on every records/nextId change
  useEffect(() => {
    persistData(records, nextId);
  }, [records, nextId]);

  // Keyboard
  useEffect(() => {
    const h = (e) => {
      if (e.key === "Escape") {
        if (planogramEntryId) return; // planogram handles its own escape
        if (formModal) { setFormModal(null); return; }
        if (transitionSourceId) { setTransitionSourceId(null); return; }
        if (detailId) { setDetailId(null); return; }
        if (showMap) { setShowMap(false); return; }
      }
    };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [formModal, transitionSourceId, detailId, showMap, planogramEntryId]);

  // ── Handlers ──
  const handleSortBy = (c) => {
    if (sortCol === c) setSortAsc(!sortAsc);
    else { setSortCol(c); setSortAsc(true); }
  };

  const toggleSelect = (id, e) => {
    e.stopPropagation();
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };

  const toggleSelectAll = () => {
    const visible = getFiltered();
    const allSelected = visible.every(r => selectedIds.has(r.id));
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (allSelected) visible.forEach(r => n.delete(r.id));
      else visible.forEach(r => n.add(r.id));
      return n;
    });
  };

  const clearSelection = () => setSelectedIds(new Set());

  const setFilter = (v) => setStatusFilter(prev => prev === v ? null : v);

  const getFiltered = () => {
    const q = searchQuery.toLowerCase();
    let f = records.filter(r => {
      if (!statusFilter && r.status === "archived") return false;
      if (statusFilter && r.status !== statusFilter) return false;
      if (q) return [getLocDisp(r), r.displayType, r.product, r.vendor, r.directive].some(x => x.toLowerCase().includes(q));
      return true;
    });
    return getSorted(f, sortCol, sortAsc);
  };

  const handleSaveRecord = (formData) => {
    if (formModal && formModal !== "add" && formModal.id != null) {
      // Edit mode
      setRecords(prev => prev.map(r => r.id === formModal.id ? { ...formData, id: formModal.id } : r));
    } else {
      // Add mode
      const newRec = { ...formData, id: nextId, modifications: [] };
      setRecords(prev => [...prev, newRec]);
      setNextId(prev => prev + 1);
    }
    setFormModal(null);
  };

  const handleBuildPlanogram = (formData) => {
    let targetId;
    if (formModal && formModal !== "add" && formModal.id != null) {
      targetId = formModal.id;
      setRecords(prev => prev.map(r => r.id === targetId ? { ...formData, id: targetId } : r));
    } else {
      targetId = nextId;
      const newRec = { ...formData, id: targetId, modifications: [] };
      setRecords(prev => [...prev, newRec]);
      setNextId(prev => prev + 1);
    }
    setFormModal(null);
    setPlanogramEntryId(targetId);
  };

  const handlePlanogramSave = (planogramDataStr) => {
    setRecords(prev => prev.map(r => r.id === planogramEntryId ? { ...r, planogramData: planogramDataStr } : r));
    setPlanogramEntryId(null);
  };

  const handleDeleteRecord = (id) => {
    setRecords(prev => prev.filter(r => r.id !== id));
    setSelectedIds(prev => { const n = new Set(prev); n.delete(id); return n; });
    if (detailId === id) setDetailId(null);
  };

  const handleTransition = (data) => {
    const src = records.find(r => r.id === transitionSourceId);
    if (!src) return;
    const newLocLabel = data.newLocation === "__other__" ? data.newOtherLocation : data.newLocation;

    // 1. Archive original
    const archivedSrc = {
      ...src, status: "archived",
      modifications: [...(src.modifications || []), { type: "Moved", date: new Date().toISOString(), detail: "Transitioned to " + newLocLabel }]
    };

    // 2. New display
    const newDisplay = {
      id: nextId, location: data.newLocation, otherLocation: data.newOtherLocation,
      displayType: data.newDisplayType, product: src.product, vendor: src.vendor,
      directive: src.directive, status: "active", setupDate: data.newSetupDate,
      expectedLife: data.newLife, permanent: false, notes: src.notes, planogramData: null,
      modifications: [{ type: "Transitioned from " + getLocDisp(src), date: new Date().toISOString(), detail: "" }]
    };

    let newRecords = records.map(r => r.id === transitionSourceId ? archivedSrc : r);
    newRecords.push(newDisplay);
    let nid = nextId + 1;

    // 3. Optional replacement
    if (data.wantsReplace) {
      newRecords.push({
        id: nid, location: src.location, otherLocation: src.otherLocation,
        displayType: data.replaceDisplayType, product: data.replaceProduct,
        vendor: data.replaceVendor, directive: data.replaceDirective,
        status: "active", setupDate: data.replaceSetupDate,
        expectedLife: data.replaceLife, permanent: false, notes: "", planogramData: null,
        modifications: [{ type: "Replaced " + src.product, date: new Date().toISOString(), detail: "" }]
      });
      nid++;
    }

    setRecords(newRecords);
    setNextId(nid);
    setTransitionSourceId(null);
  };

  const printSelected = () => {
    if (!selectedIds.size) return;
    window.print();
  };

  // ── Render ──
  const filtered = getFiltered();
  const counts = {};
  STATUS_OPTIONS.forEach(s => counts[s.value] = 0);
  records.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
  const visibleCount = records.filter(r => r.status !== "archived").length;
  const activeCount = records.filter(r => r.status === "active").length;
  const permCount = records.filter(r => r.permanent && r.status !== "archived").length;
  const archCount = counts.archived || 0;

  const transitionRecord = transitionSourceId ? records.find(r => r.id === transitionSourceId) : null;
  const detailRecord = detailId ? records.find(r => r.id === detailId) : null;
  const planogramRecord = planogramEntryId ? records.find(r => r.id === planogramEntryId) : null;

  const anyPlanoInSelection = [...selectedIds].some(id => { const r = records.find(x => x.id === id); return r && r.planogramData; });

  return (
    <React.Fragment>
      <div className="app">
        {/* Header */}
        <div className="header">
          <div className="header-left">
            <h1>Display Location Tracker</h1>
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:4}}>
              <p style={{margin:0}}>{visibleCount} active displays {"\u00b7"} {activeCount} active {"\u00b7"} {permCount} permanent{archCount ? " \u00b7 " + archCount + " archived" : ""}</p>
              <SyncIndicator syncState={syncState} onRefresh={handleRefreshFromGitHub} onOpenSettings={() => setShowSettings(true)} />
            </div>
          </div>
          <div className="header-actions">
            <button className="btn" onClick={() => setShowMap(true)}>{"\ud83d\uddfa"} Map</button>
            <button className="btn" onClick={() => handleExportCSV(records)}>{"\u2193"} CSV</button>
            {selectedIds.size > 0 && (
              <React.Fragment>
                {anyPlanoInSelection && (
                  <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--text2)",cursor:"pointer"}}>
                    <input type="checkbox" checked={includePlanoInPrint} onChange={e => setIncludePlanoInPrint(e.target.checked)} style={{accentColor:"var(--green)"}} />
                    Incl. Planogram
                  </label>
                )}
                <button className="btn btn-print" onClick={printSelected}>{"\u2399"} Print Selected ({selectedIds.size})</button>
                <button className="btn btn-sm" onClick={clearSelection} style={{fontSize:11}}>Clear</button>
              </React.Fragment>
            )}
            <button className="btn btn-primary" onClick={() => setFormModal("add")}>+ New Display</button>
          </div>
        </div>

        {/* Status Bar */}
        <div className="status-bar">
          <div className={"status-pill" + (!statusFilter ? " selected" : "")} onClick={() => setFilter(null)}>
            All <span className="count">{visibleCount}</span>
          </div>
          {STATUS_OPTIONS.map(s => (
            <div key={s.value} className={"status-pill" + (statusFilter === s.value ? " selected" : "")}
              onClick={() => setFilter(s.value)}
              style={s.value === "archived" ? { marginLeft: "auto", opacity: counts[s.value] ? 1 : 0.4 } : {}}>
              <span className="dot" style={{ background: s.color }} />
              {s.label}
              <span className="count">{counts[s.value]}</span>
            </div>
          ))}
        </div>

        {/* Toolbar */}
        <div className="toolbar">
          <input className="search-box" placeholder="Search by location, product, vendor, directive..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
          <button className="btn btn-sm" onClick={toggleSelectAll} style={{fontSize:11}}>{"\u2610"} Select All</button>
        </div>

        {/* Table */}
        <div className="table-wrap"><div className="table-scroll">
          <table><thead><tr>
            <th className="cb-cell no-sort">{"\u2610"}</th>
            <th onClick={() => handleSortBy("location")}>Location</th>
            <th onClick={() => handleSortBy("displayType")}>Display Type</th>
            <th onClick={() => handleSortBy("product")}>Product</th>
            <th onClick={() => handleSortBy("vendor")}>Vendor</th>
            <th onClick={() => handleSortBy("directive")}>Directive</th>
            <th onClick={() => handleSortBy("status")}>Status</th>
            <th onClick={() => handleSortBy("setupDate")}>Timeline</th>
            <th>Mods</th>
            <th style={{width:130}}></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={10}>
                <div className="empty-state">
                  <p>No displays found{searchQuery || statusFilter ? " matching filters" : ""}.</p>
                  {!searchQuery && !statusFilter && <button className="btn btn-primary" onClick={() => setFormModal("add")}>+ Add First Display</button>}
                </div>
              </td></tr>
            ) : filtered.map(r => {
              const st = getStatus(r.status);
              const loc = getLocDisp(r);
              const lg = getLocGroup(r.location);
              const sel = selectedIds.has(r.id);
              const ms = r.modifications || [];
              const rc = r.status === "expiring" ? "row-expiring" : r.status === "expired" ? "row-expired" : "";

              let timeline;
              if (r.permanent) {
                timeline = <React.Fragment><div className="perm-indicator"><span className="perm-dot" /> Permanent</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Since {fmtDateShort(r.setupDate)}</div></React.Fragment>;
              } else if (r.setupDate && r.expectedLife) {
                const d = daysRem(r.setupDate, r.expectedLife);
                const p = lifePct(r);
                timeline = <div className="life-bar-wrap"><div className="life-bar-bg"><div className="life-bar-fill" style={{width: p + "%", background: lifeCol(p)}} /></div><div className="life-label">{r.expectedLife}d {"\u00b7"} {d > 0 ? d + "d left" : "Past due"}</div></div>;
              } else {
                timeline = <span style={{color:"var(--text3)",fontSize:12}}>{"\u2014"}</span>;
              }

              let modsCell;
              if (ms.length) {
                const lt = ms[ms.length - 1];
                modsCell = <React.Fragment><span className="mod-badge">{lt.type}</span>{ms.length > 1 && <span className="mod-count"> +{ms.length - 1}</span>}</React.Fragment>;
              } else {
                modsCell = <span style={{color:"var(--text3)",fontSize:12}}>{"\u2014"}</span>;
              }

              return (
                <tr key={r.id} className={rc + (sel ? " row-selected" : "")} style={{cursor:"pointer"}} onClick={() => setDetailId(r.id)}>
                  <td className="cb-cell" onClick={e => toggleSelect(r.id, e)}>
                    <input type="checkbox" checked={sel} onChange={() => {}} onClick={e => toggleSelect(r.id, e)} />
                  </td>
                  <td><div className="loc-code">{loc}</div><div className="loc-sub">{lg}</div></td>
                  <td style={{fontSize:13}}>{r.displayType}</td>
                  <td><div className="product-name">{r.product}</div></td>
                  <td style={{fontSize:13}}>{r.vendor}</td>
                  <td><span className={"directive-tag " + dirClass(r.directive)}>{r.directive}</span></td>
                  <td><span className="badge" style={{background: st.color}}>{st.label}</span></td>
                  <td>{timeline}</td>
                  <td>{modsCell}</td>
                  <td onClick={e => e.stopPropagation()}>
                    <div className="actions-cell">
                      {r.planogramData && <button className="btn btn-sm btn-print" onClick={() => setPlanogramEntryId(r.id)} title="View Planogram">{"\ud83d\udcd0"}</button>}
                      <button className="btn btn-sm" onClick={() => { setDetailId(null); setFormModal(r); }} title="Edit">{"\u270e"}</button>
                      <button className="btn btn-sm btn-transition" onClick={() => { setDetailId(null); setTransitionSourceId(r.id); }} title="Transition">{"\u26a1"}</button>
                      <button className="btn btn-sm btn-danger" onClick={() => handleDeleteRecord(r.id)} title="Delete">{"\u2715"}</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
          </table>
        </div></div>
      </div>

      {/* Print sheet (declarative React, hidden until window.print) */}
      <PrintSheet
        selectedRecords={records.filter(r => selectedIds.has(r.id))}
        includePlanoInPrint={includePlanoInPrint}
      />

      {/* Modals */}
      {formModal && (
        <DisplayFormModal
          record={formModal === "add" ? null : formModal}
          isEdit={formModal !== "add"}
          mapB64={mapB64}
          onSave={handleSaveRecord}
          onClose={() => setFormModal(null)}
          onBuildPlanogram={handleBuildPlanogram}
        />
      )}
      {transitionRecord && (
        <TransitionWizard record={transitionRecord} onExecute={handleTransition} onClose={() => setTransitionSourceId(null)} />
      )}
      {detailRecord && (
        <DetailPanel record={detailRecord} onEdit={(id) => { setDetailId(null); const r = records.find(x => x.id === id); if (r) setFormModal(r); }} onTransition={(id) => { setDetailId(null); setTransitionSourceId(id); }} onDelete={handleDeleteRecord} onViewPlanogram={(id) => { setDetailId(null); setPlanogramEntryId(id); }} onClose={() => setDetailId(null)} />
      )}
      {showMap && (
        <MapModal mapB64={mapB64} onUpload={(data) => setMapB64(data)} onClose={() => setShowMap(false)} />
      )}
      {planogramRecord && (
        <PlanogramModal initialData={planogramRecord.planogramData} onSave={handlePlanogramSave} onCancel={() => setPlanogramEntryId(null)} />
      )}
      {showSettings && (
        <SettingsModal onClose={() => setShowSettings(false)} onSaved={handleSettingsSaved} />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
