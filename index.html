<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0F1114;--surface:#1A1D22;--surface2:#22262D;--surface3:#2C3038;
    --border:#2E3440;--border-focus:#5B8DEF;--text:#E8EAED;--text2:#9AA0AB;
    --text3:#6B7280;--accent:#5B8DEF;--accent-dim:rgba(91,141,239,0.12);
    --green:#34C759;--orange:#FF9F0A;--red:#FF3B30;--purple:#BF5AF2;
    --mono:'JetBrains Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.4}
  #root{min-height:100vh}
  .app{max-width:1400px;margin:0 auto;padding:24px 28px;min-height:100vh}
  .header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .header-left h1{font-size:22px;font-weight:700;letter-spacing:-0.3px}
  .header-left p{font-size:13px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap}
  .status-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .status-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
  .status-pill:hover{border-color:var(--text3)}
  .status-pill.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--text)}
  .status-pill .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .status-pill .count{font-family:var(--mono);font-size:11px;background:var(--surface3);padding:1px 6px;border-radius:3px}
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .search-box{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
  .search-box:focus{border-color:var(--accent)}
  .search-box::placeholder{color:var(--text3)}
  .btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--text3);background:var(--surface2)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:#4A7DE0}
  .btn-danger{color:var(--red)}.btn-danger:hover{background:rgba(255,59,48,.1);border-color:var(--red)}
  .btn-transition{color:var(--purple);border-color:rgba(191,90,242,.3)}
  .btn-transition:hover{background:rgba(191,90,242,.1);border-color:var(--purple)}
  .btn-print{color:var(--green);border-color:rgba(52,199,89,.3)}
  .btn-print:hover{background:rgba(52,199,89,.1);border-color:var(--green)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:default;pointer-events:none}
  .select-count{font-size:12px;color:var(--text3);font-family:var(--mono);padding:4px 0}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:1100px}
  thead{background:var(--surface2)}
  th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
  th:hover{color:var(--text2)}
  th.no-sort{cursor:default}
  th.no-sort:hover{color:var(--text3)}
  td{padding:10px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(91,141,239,.04)}
  tr.row-expiring td{background:rgba(255,159,10,.04)}
  tr.row-expired td{background:rgba(255,59,48,.04)}
  tr.row-selected td{background:rgba(52,199,89,.06)}
  .cb-cell{width:36px;text-align:center}
  .cb-cell input[type="checkbox"]{width:16px;height:16px;accent-color:var(--green);cursor:pointer}
  .product-name{font-weight:500}
  .vendor-cell{color:var(--text2);font-size:12px}
  .loc-code{font-family:var(--mono);font-weight:600;font-size:13px}
  .loc-sub{font-size:11px;color:var(--text3)}
  .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.2px;color:#fff}
  .directive-tag{font-size:11px;padding:2px 7px;border-radius:3px;background:var(--surface3);color:var(--text2);display:inline-block;white-space:nowrap}
  .directive-tag.mandatory{background:rgba(255,59,48,.15);color:#FF6961}
  .directive-tag.vendor{background:rgba(91,141,239,.15);color:#7BA3F7}
  .directive-tag.seasonal{background:rgba(52,199,89,.15);color:#5AD87A}
  .life-bar-wrap{width:80px}
  .life-bar-bg{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
  .life-bar-fill{height:100%;border-radius:2px;transition:width .3s}
  .life-label{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px}
  .perm-indicator{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
  .perm-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
  .mod-badge{font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(255,159,10,.12);color:#FFB340;display:inline-block;white-space:nowrap;font-weight:500}
  .mod-count{font-family:var(--mono);font-size:10px;color:var(--text3)}
  .actions-cell{display:flex;gap:4px}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty-state p{font-size:14px;margin-bottom:12px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .modal-layout{display:flex;gap:0;max-width:1100px;width:100%;max-height:90vh;animation:slideUp .2s ease}
  @keyframes slideUp{from{transform:translateY(12px);opacity:0}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:10px 0 0 10px;flex:1;min-width:0;overflow-y:auto}
  .modal.no-map{border-radius:10px}
  .modal-map{width:420px;min-width:320px;background:var(--surface2);border:1px solid var(--border);border-left:none;border-radius:0 10px 10px 0;overflow:hidden;display:flex;flex-direction:column}
  .modal-map-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
  .modal-map-body{flex:1;overflow:auto;padding:8px;display:flex;align-items:flex-start;justify-content:center}
  .modal-map-body img{width:100%;height:auto;border-radius:4px;cursor:zoom-in}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
  .modal-header h2{font-size:16px;font-weight:600}
  .modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px}
  .modal-close:hover{color:var(--text)}
  .modal-body{padding:22px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  .form-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
  .form-group input,.form-group select,.form-group textarea{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border-color .15s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{resize:vertical;min-height:60px}
  .form-group select{cursor:pointer}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--border)}
  .checkbox-row{display:flex;align-items:center;gap:8px;padding-top:6px}
  .checkbox-row input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .checkbox-row label{font-size:13px;color:var(--text);text-transform:none;letter-spacing:0;font-weight:500;cursor:pointer}
  .mod-form-section{border:1px solid var(--border);border-radius:6px;padding:14px;background:var(--bg);margin-top:4px}
  .mod-form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .mod-form-row .form-group{flex:1;min-width:140px}
  .mod-extras{margin-top:10px;padding:10px;background:var(--surface);border:1px dashed var(--border);border-radius:5px}
  .mod-extras h4{font-size:11px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
  .mod-history{margin-top:10px;max-height:140px;overflow-y:auto}
  .mod-history-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
  .mod-history-item:last-child{border-bottom:none}
  .transition-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1100;padding:20px;animation:fadeIn .15s ease}
  .transition-wizard{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:slideUp .2s ease}
  .transition-wizard .tw-header{padding:18px 22px;border-bottom:1px solid var(--border)}
  .transition-wizard .tw-header h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .transition-wizard .tw-header h2 .tw-icon{color:var(--purple);font-size:18px}
  .transition-wizard .tw-header p{font-size:12px;color:var(--text3);margin-top:4px}
  .tw-body{padding:22px}
  .tw-section{margin-bottom:18px;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
  .tw-section h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .tw-section h3.expire-title{color:var(--red)}
  .tw-section h3.new-title{color:var(--green)}
  .tw-section h3.replace-title{color:var(--purple)}
  .tw-summary{font-size:13px;color:var(--text2);line-height:1.6}
  .tw-summary strong{color:var(--text)}
  .tw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tw-footer{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--border)}
  .map-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1100;padding:30px;animation:fadeIn .15s ease}
  .map-viewer{background:var(--surface);border:1px solid var(--border);border-radius:10px;max-width:1000px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
  .map-viewer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
  .map-viewer-header h2{font-size:16px;font-weight:600}
  .map-viewer-body{overflow:auto;padding:16px;flex:1}
  .map-viewer-body img{width:100%;height:auto;border-radius:4px}
  .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;justify-content:flex-end;z-index:900;animation:fadeIn .15s ease}
  .detail-panel{width:440px;max-width:90vw;background:var(--surface);border-left:1px solid var(--border);height:100%;overflow-y:auto;animation:slideLeft .2s ease;padding:24px}
  @keyframes slideLeft{from{transform:translateX(20px);opacity:0}}
  .detail-panel h2{font-size:18px;font-weight:600;margin-bottom:6px}
  .detail-sub{color:var(--text3);font-size:13px;margin-bottom:20px}
  .detail-section{margin-bottom:20px}
  .detail-section h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
  .detail-row .dlabel{color:var(--text3)}
  .detail-row .dvalue{color:var(--text);font-weight:500;text-align:right}
  .detail-row .mono{font-family:var(--mono);font-size:12px}
  .mod-log{list-style:none;padding:0}
  .mod-log li{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
  .mod-log li:last-child{border-bottom:none}
  .mod-log .mod-type{font-weight:600;color:var(--orange)}
  .mod-log .mod-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:8px}
  .mod-log .mod-detail{color:var(--text2);margin-top:3px;font-size:12px}

  /* Planogram modal overlay */
  .plano-modal-overlay{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;animation:fadeIn .15s ease}
  .plano-modal-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .plano-modal-topbar h2{font-size:15px;font-weight:600;color:var(--text)}
  .plano-modal-topbar .plano-actions{display:flex;gap:8px}
  .plano-modal-body{flex:1;overflow:hidden}

  /* Print styles */
  .print-sheet{display:none}
  @media print{
    body{background:#fff!important;color:#000!important}
    .app,.plano-modal-overlay{display:none!important}
    .modal-overlay,.detail-overlay,.map-overlay,.transition-overlay{display:none!important}
    .print-sheet{display:block!important;padding:20px;font-family:'DM Sans',-apple-system,sans-serif}
    .print-sheet .ps-header{text-align:center;border-bottom:3px solid #000;padding-bottom:12px;margin-bottom:24px}
    .print-sheet .ps-header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
    .print-sheet .ps-header p{font-size:11px;color:#666;margin-top:4px}
    .print-sheet .ps-card{border:2px solid #333;border-radius:6px;padding:16px 20px;margin-bottom:16px;page-break-inside:avoid}
    .print-sheet .ps-loc{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;margin-bottom:2px}
    .print-sheet .ps-type{font-size:12px;color:#666;margin-bottom:4px}
    .print-sheet .ps-product{font-size:14px;font-weight:600;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #ddd}
    .print-sheet .ps-notes{font-size:13px;color:#333;line-height:1.5}
    .print-sheet .ps-notes-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#999;margin-bottom:3px}
    .print-sheet .ps-meta{font-size:10px;color:#999;margin-top:8px;display:flex;gap:16px}
    .print-sheet .ps-plano{margin-top:12px;padding-top:12px;border-top:1px solid #ddd}
    .print-sheet .ps-plano h4{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px;color:#666}
    .print-sheet .ps-plano-shelf{display:flex;align-items:flex-end;gap:0;border-bottom:3px solid #8B4513;margin-bottom:6px;min-height:40px;background:#fafafa;padding:2px}
    .print-sheet .ps-plano-product{display:inline-flex;flex-direction:column;align-items:center;border:1px solid #ddd;background:#fff;font-size:8px;text-align:center;overflow:hidden}
    .print-sheet .ps-plano-product img{max-width:100%;max-height:100%;object-fit:contain}
  }
  @media(max-width:900px){.modal-map{display:none}.modal{border-radius:10px}}
  @media(max-width:768px){.form-grid,.tw-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start;gap:12px}}
</style>

<div id="root"></div>
<script type="text/babel">

// ═══════════════════════════════════════════════════════════════
//  TRACKER CONSTANTS
// ═══════════════════════════════════════════════════════════════
const { useState, useRef, useCallback, useEffect, createContext, useContext } = React;

const LOCATIONS={"Rear B Side":["1BR","2BR","3BR","4BR","5BR","6BR"],"Front B Side":["2BF","3BF","4BF","5BF","6BF"],"Rear A Side":["2AR","3AR","4AR","5AR","6AR"],"Front A Side":["2AF","3AF","6AF"],"Misc":["Metro Front Cold Beverage","Metro Rear Cold Beverage"]};
const LOCATION_FLAT=[];Object.entries(LOCATIONS).forEach(([g,cs])=>cs.forEach(c=>LOCATION_FLAT.push({code:c,group:g})));LOCATION_FLAT.push({code:"__other__",group:"Other"});
const DISPLAY_TYPES=["Endcap","Small Tall Metro","Small Short Metro","Medium Tall Metro","Medium Short Metro","Large Frozen Metro","Medium Frozen Metro","Front Table","Lobby Stack","Entrance Stack","Produce Stack","Dairy Table","Dairy Shelf","Franz Undertable","Wood Shelf","Mobile Refrigeration Unit"];
const TRANSITION_MODS=["Moved","Downsized to Metro"];
const DIRECTIVE_TAGS=["Corporate Mandatory","Regional Directive","Vendor Funded","Seasonal Program","Store Discretion","Test/Pilot","Clearance"];
const STATUS_OPTIONS=[{value:"scheduled",label:"Scheduled",color:"#5B8DEF"},{value:"active",label:"Active",color:"#34C759"},{value:"expiring",label:"Expiring Soon",color:"#FF9F0A"},{value:"expired",label:"Expired",color:"#FF3B30"},{value:"archived",label:"Archived",color:"#8E8E93"}];
const STORAGE_KEY="display_tracker_v6";

// ═══════════════════════════════════════════════════════════════
//  GITHUB SYNC ENGINE
// ═══════════════════════════════════════════════════════════════
const GH_CONFIG_KEY = "display_tracker_gh_config";
const GH_SYNC_CACHE_KEY = "display_tracker_gh_cache";

const GitHubSync = {
  _sha: null,
  _config: null,
  _status: "idle", // idle | syncing | synced | error | offline
  _lastSync: null,
  _listeners: [],
  _saveTimer: null,

  onStatusChange(fn) { this._listeners.push(fn); return () => { this._listeners = this._listeners.filter(f => f !== fn); }; },
  _notify() { this._listeners.forEach(fn => fn({ status: this._status, lastSync: this._lastSync })); },

  setStatus(s) { this._status = s; this._notify(); },

  getConfig() {
    if (this._config) return this._config;
    try { this._config = JSON.parse(localStorage.getItem(GH_CONFIG_KEY)); } catch {}
    return this._config;
  },

  saveConfig(cfg) {
    this._config = cfg;
    localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg));
  },

  clearConfig() {
    this._config = null;
    this._sha = null;
    localStorage.removeItem(GH_CONFIG_KEY);
  },

  isConfigured() {
    const c = this.getConfig();
    return c && c.token && c.owner && c.repo;
  },

  _headers() {
    const c = this.getConfig();
    return {
      "Authorization": "Bearer " + c.token,
      "Accept": "application/vnd.github.v3+json",
      "X-GitHub-Api-Version": "2022-11-28"
    };
  },

  _url() {
    const c = this.getConfig();
    return `https://api.github.com/repos/${c.owner}/${c.repo}/contents/data.json`;
  },

  async testConnection() {
    const c = this.getConfig();
    if (!c || !c.token || !c.owner || !c.repo) throw new Error("Missing configuration");
    const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}`, {
      headers: this._headers()
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.message || `HTTP ${res.status}`);
    }
    return await res.json();
  },

  async load() {
    if (!this.isConfigured()) return null;
    this.setStatus("syncing");
    try {
      const res = await fetch(this._url(), { headers: this._headers() });
      if (res.status === 404) {
        this.setStatus("synced");
        return null; // data.json doesn't exist yet
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const file = await res.json();
      this._sha = file.sha;
      const content = JSON.parse(atob(file.content.replace(/\n/g, "")));
      // Cache locally
      localStorage.setItem(GH_SYNC_CACHE_KEY, JSON.stringify(content));
      this._lastSync = new Date();
      this.setStatus("synced");
      return content;
    } catch (err) {
      console.warn("GitHub sync load failed:", err);
      this.setStatus(navigator.onLine ? "error" : "offline");
      // Fall back to cached data
      try { return JSON.parse(localStorage.getItem(GH_SYNC_CACHE_KEY)); } catch { return null; }
    }
  },

  async save(data) {
    if (!this.isConfigured()) {
      // No GitHub configured, just save to localStorage
      localStorage.setItem(GH_SYNC_CACHE_KEY, JSON.stringify(data));
      return;
    }
    this.setStatus("syncing");
    try {
      const body = {
        message: "Update display tracker data",
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      };
      if (this._sha) body.sha = this._sha;

      const res = await fetch(this._url(), {
        method: "PUT",
        headers: { ...this._headers(), "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (res.status === 409) {
        // Conflict: re-fetch and retry once
        console.warn("GitHub sync conflict, re-fetching...");
        const fresh = await this.load();
        if (fresh) {
          // Merge strategy: our local data wins (last-write-wins for small teams)
          body.sha = this._sha;
          body.content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
          const retry = await fetch(this._url(), {
            method: "PUT",
            headers: { ...this._headers(), "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (!retry.ok) throw new Error(`Retry failed: HTTP ${retry.status}`);
          const retryData = await retry.json();
          this._sha = retryData.content.sha;
        }
      } else if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      } else {
        const result = await res.json();
        this._sha = result.content.sha;
      }

      localStorage.setItem(GH_SYNC_CACHE_KEY, JSON.stringify(data));
      this._lastSync = new Date();
      this.setStatus("synced");
    } catch (err) {
      console.warn("GitHub sync save failed:", err);
      localStorage.setItem(GH_SYNC_CACHE_KEY, JSON.stringify(data));
      this.setStatus(navigator.onLine ? "error" : "offline");
    }
  },

  // Debounced save to avoid excessive API calls
  debouncedSave(data, delayMs = 2000) {
    clearTimeout(this._saveTimer);
    // Always update local cache immediately
    localStorage.setItem(GH_SYNC_CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ records: data.records, nextId: data.nextId }));
    this._saveTimer = setTimeout(() => this.save(data), delayMs);
  }
};

// ── Unit system ──
const UNITS = {
  mm: { label: "mm", factor: 1, decimals: 0 },
  cm: { label: "cm", factor: 0.1, decimals: 1 },
  inches: { label: "in", factor: 1 / 25.4, decimals: 2 },
  feet: { label: "ft", factor: 1 / 304.8, decimals: 3 },
};
const UnitCtx = createContext("inches");
function fromMM(val, unit) { if (val == null || val === "") return ""; return +(val * UNITS[unit].factor).toFixed(UNITS[unit].decimals); }
function toMM(val, unit) { if (val == null || val === "") return null; return Math.round(+val / UNITS[unit].factor); }
function fmtDim(val, unit) { if (val == null) return "\u2014"; return `${fromMM(val, unit)}${UNITS[unit].label}`; }

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

const storage = {
  async get(key) {
    // Check GitHub cache for planogram saves
    if (key.startsWith("plano:")) {
      try { const gh = JSON.parse(localStorage.getItem(GH_SYNC_CACHE_KEY)); if (gh && gh.planograms && gh.planograms[key]) return { key, value: JSON.stringify(gh.planograms[key]) }; } catch {}
    }
    const v = localStorage.getItem(key); if (v === null) throw new Error("not found"); return { key, value: v };
  },
  async set(key, value) { localStorage.setItem(key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem(key); return { key, deleted: true }; },
  async list(prefix = "") {
    const keys = [];
    // Include planogram keys from GitHub cache
    if (prefix === "plano:") {
      try { const gh = JSON.parse(localStorage.getItem(GH_SYNC_CACHE_KEY)); if (gh && gh.planograms) Object.keys(gh.planograms).forEach(k => { if (k.startsWith(prefix) && !keys.includes(k)) keys.push(k); }); } catch {}
    }
    for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (k.startsWith(prefix) && !keys.includes(k)) keys.push(k); }
    return { keys };
  },
};

// ── Auto-trim: detect whitespace borders via canvas ──
function autoTrimImage(imgUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const c = document.createElement("canvas");
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0);
        const d = ctx.getImageData(0, 0, c.width, c.height).data;
        const thresh = 240;
        const isWhite = (i) => d[i] > thresh && d[i + 1] > thresh && d[i + 2] > thresh;
        let top = 0, bottom = c.height - 1, left = 0, right = c.width - 1;
        outer1: for (let y = 0; y < c.height; y++) { for (let x = 0; x < c.width; x++) { if (!isWhite((y * c.width + x) * 4)) { top = y; break outer1; } } }
        outer2: for (let y = c.height - 1; y >= 0; y--) { for (let x = 0; x < c.width; x++) { if (!isWhite((y * c.width + x) * 4)) { bottom = y; break outer2; } } }
        outer3: for (let x = 0; x < c.width; x++) { for (let y = 0; y < c.height; y++) { if (!isWhite((y * c.width + x) * 4)) { left = x; break outer3; } } }
        outer4: for (let x = c.width - 1; x >= 0; x--) { for (let y = 0; y < c.height; y++) { if (!isWhite((y * c.width + x) * 4)) { right = x; break outer4; } } }
        resolve({ cropT: Math.round((top / c.height) * 100), cropB: Math.round(((c.height - 1 - bottom) / c.height) * 100), cropL: Math.round((left / c.width) * 100), cropR: Math.round(((c.width - 1 - right) / c.width) * 100) });
      } catch { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = imgUrl;
  });
}

        <div style={section}><strong>Spacing</strong></div>
        <label style={row}>
          <span style={sp}>Gap (px)</span>
          <input type="range" min={0} max={20} value={gap} onChange={(e) => setGap(+e.target.value)} style={{ flex: 1 }} />
          <span style={{ fontSize: 12, color: "#6b7280", width: 30, textAlign: "right" }}>{gap}</span>
        </label>

        {product.image_url && (
          <React.Fragment>
            <div style={section}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <strong>Image Crop</strong>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={handleAutoTrim} disabled={trimming} style={{ padding: "3px 10px", fontSize: 11, background: trimming ? "#d1d5db" : "#8b5cf6", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer" }}>
                    {trimming ? "Trimming..." : "Auto-Trim"}
                  </button>
                  <button onClick={() => { setCropT(0); setCropB(0); setCropL(0); setCropR(0); }} style={{ padding: "3px 10px", fontSize: 11, background: "#e5e7eb", color: "#4b5563", border: "none", borderRadius: 4, cursor: "pointer" }}>Reset</button>
                </div>
              </div>
              {trimError && <div style={{ fontSize: 11, color: "#f59e0b", marginTop: 4 }}>Auto-trim failed (CORS). Use manual sliders below.</div>}
            </div>
            <div style={{ display: "flex", gap: 16, marginBottom: 8, alignItems: "flex-start" }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 4 }}>Original</div>
                <div style={{ width: 80, height: 100, background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                  <img src={product.image_url} alt="" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain" }} />
                </div>
              </div>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 10, color: "#9ca3af", marginBottom: 4 }}>Cropped</div>
                <div style={{ width: 80, height: 100, background: "#f9fafb", border: "1px solid #e5e7eb", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                  <img src={product.image_url} alt="" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", clipPath: cropPreviewClip }} />
                </div>
              </div>
              <div style={{ flex: 1, fontSize: 11, color: "#6b7280", paddingTop: 14 }}>
                Crop removes whitespace from the image edges. Auto-Trim detects white borders automatically. Adjust sliders for manual control.
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "50px 1fr 30px", gap: "4px 8px", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 12, color: "#6b7280" }}>Top</span>
              <input type="range" min={0} max={50} value={cropT} onChange={(e) => setCropT(+e.target.value)} />
              <span style={{ fontSize: 11, color: "#6b7280", textAlign: "right" }}>{cropT}%</span>
              <span style={{ fontSize: 12, color: "#6b7280" }}>Bottom</span>
              <input type="range" min={0} max={50} value={cropB} onChange={(e) => setCropB(+e.target.value)} />
              <span style={{ fontSize: 11, color: "#6b7280", textAlign: "right" }}>{cropB}%</span>
              <span style={{ fontSize: 12, color: "#6b7280" }}>Left</span>
              <input type="range" min={0} max={50} value={cropL} onChange={(e) => setCropL(+e.target.value)} />
              <span style={{ fontSize: 11, color: "#6b7280", textAlign: "right" }}>{cropL}%</span>
              <span style={{ fontSize: 12, color: "#6b7280" }}>Right</span>
              <input type="range" min={0} max={50} value={cropR} onChange={(e) => setCropR(+e.target.value)} />
              <span style={{ fontSize: 11, color: "#6b7280", textAlign: "right" }}>{cropR}%</span>
            </div>
          </React.Fragment>
        )}

        <div style={{ marginTop: 12, padding: 8, background: "#f0fdf4", borderRadius: 6, border: "1px solid #bbf7d0" }}>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 12 }}>
            <input type="checkbox" checked={saveAsTemplate} onChange={(e) => setSaveAsTemplate(e.target.checked)} />
            Save dimensions as new template
          </label>
          {saveAsTemplate && <input value={tplName} onChange={(e) => setTplName(e.target.value)} placeholder="Template name" style={{ marginTop: 6, width: "100%", boxSizing: "border-box", border: "1px solid #d1d5db", borderRadius: 4, padding: "4px 8px", fontSize: 13 }} />}
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
          <button onClick={onCancel} style={{ padding: "6px 12px", fontSize: 13, color: "#6b7280", background: "none", border: "none", cursor: "pointer" }}>Cancel</button>
          <button onClick={handleSave} style={{ padding: "6px 12px", fontSize: 13, background: "#3b82f6", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer" }}>Save</button>
        </div>
      </div>
    </div>
  );
}

        <h3 style={{ fontWeight: 700, marginBottom: 12 }}>{mode === "save" ? "Save Planogram" : "Load Planogram"}</h3>

          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            <input autoFocus value={name} onChange={(e) => setName(e.target.value)} placeholder="Planogram name..." style={{ flex: 1, border: "1px solid #d1d5db", borderRadius: 4, padding: "6px 12px", fontSize: 14 }} onKeyDown={(e) => e.key === "Enter" && name.trim() && onSave(name.trim())} />
            <button disabled={!name.trim()} onClick={() => onSave(name.trim())} style={{ padding: "6px 12px", background: !name.trim() ? "#93c5fd" : "#3b82f6", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13 }}>Save</button>

          {saves.map((s) => (
            <div key={s.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: 8, borderRadius: 4, border: "1px solid #f3f4f6", marginBottom: 4 }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{s.name}</div>
                <div style={{ fontSize: 12, color: "#9ca3af" }}>{s.shelves} shelves {"\u00b7"} {s.products} products {"\u00b7"} {new Date(s.date).toLocaleDateString()}</div>
              </div>
              <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>

                <button onClick={() => onDelete(s.key)} style={{ padding: "4px 8px", fontSize: 12, background: "#fee2e2", color: "#dc2626", border: "none", borderRadius: 4, cursor: "pointer" }}>Del</button>

      </div>
    </div>
  );
}
